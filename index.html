<style>

/* ===== йЎ¶йғЁ ===== */

.cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }

/* ===== еҶ…е®№еҢ?===== */

.vocab-card .card-example { color:#999; font-size:0.82em; font-style:italic; line-height:1.4; }

.card-toggle-zh { background:none; border:1px solid #ddd; font-size:0.68em; padding:1px 7px; border-radius:10px; cursor:pointer; color:#aaa; margin-left:6px; vertical-align:middle; transition:all 0.15s; font-weight:500; }

/* ===== Quiz жөӢйӘҢзі»з»ҹ ===== */
.quiz-btn { display:inline-flex; align-items:center; gap:5px; margin:0 auto; padding:7px 20px; border:2px solid #e67e22; border-radius:20px; background:#fff; color:#e67e22; font-size:0.9em; font-weight:600; cursor:pointer; transition:all 0.2s; margin-top:6px; }

/* Quiz е…ЁеұҸйҒ®зҪ© */

.quiz-overlay.active { display:block; }
.quiz-overlay .quiz-inner { max-width:640px; margin:0 auto; padding:16px; min-height:100vh; }

/* Quiz йЎ¶йғЁ */

/* Quiz жЁЎејҸйҖүжӢ©йЎ?*/

/* Quiz и®ҫзҪ®еҢ?*/
.quiz-setup { margin-top:20px; background:#fff; border-radius:16px; padding:20px; border:2px solid #e8daff; }
.quiz-setup h3 { font-size:1em; color:#2d1b69; margin-bottom:12px; }

.quiz-range-btn { padding:7px 16px; border:2px solid #ddd; border-radius:20px; background:#fff; font-size:0.85em; cursor:pointer; transition:all 0.15s; font-weight:600; color:#666; }

.quiz-count-row { display:flex; align-items:center; gap:12px; margin-bottom:16px; }

.quiz-start-btn { width:100%; padding:14px; border:none; border-radius:14px; background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; font-size:1.1em; font-weight:700; cursor:pointer; transition:all 0.2s; letter-spacing:1px; }

/* Quiz зӯ”йўҳдё?*/

/* йўҳзӣ®еҚ?*/

/* Quiz з»“жһңйЎ?*/

/* еӣһеҲ°йЎ¶з«Ҝ */
.back-top { position:fixed; right:16px; bottom:24px; width:56px; height:56px; border-radius:50%; border:none; background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; font-size:1.5em; cursor:pointer; box-shadow:0 4px 14px rgba(118,75,162,0.45); opacity:0; pointer-events:none; transition:opacity 0.3s; z-index:9999; display:flex; align-items:center; justify-content:center; touch-action:manipulation; }

/* ===== йҹійў‘еј•ж“ҺпјҲWeb Audio API + зј“еӯҳжұ?+ TTS е…ңеә•пј?==== */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const bufferCache = {};   // wordKey вҶ?AudioBuffer
const loadingSet = new Set(); // жӯЈеңЁеҠ иҪҪзҡ?let currentSource = null;     // еҪ“еүҚж’ӯж”ҫзҡ?BufferSource
let currentBtn = null;        // еҪ“еүҚж’ӯж”ҫзҡ„жҢүй’?let currentKey = null;        // еҪ“еүҚж’ӯж”ҫзҡ„word key
let currentTTS = false;       // еҪ“еүҚжҳҜеҗҰеңЁж’ӯTTS
let unlocked = false;

// iOS: йҰ–ж¬Ўи§Ұж‘ёи§Јй”Ғ AudioContext
function unlockAudio() {
  if (unlocked) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  unlocked = true;
  preloadAll();
}
document.addEventListener('touchstart', unlockAudio, { once:true });
document.addEventListener('click', unlockAudio, { once:true });

// ејӮжӯҘеҠ иҪҪйҹійў‘еҲ?AudioBuffer
async function loadBuffer(key) {
  if (bufferCache[key]) return bufferCache[key];
  if (loadingSet.has(key)) return null;
  loadingSet.add(key);
  try {
    const resp = await fetch('vocab-audio/' + key + '.mp3');
    if (!resp.ok) { bufferCache[key] = null; return null; }
    const arrayBuf = await resp.arrayBuffer();
    const audioBuf = await audioCtx.decodeAudioData(arrayBuf);
    bufferCache[key] = audioBuf;
    return audioBuf;
  } catch(e) {
    bufferCache[key] = null;
    return null;
  } finally {
    loadingSet.delete(key);
  }
}

// е…ЁйҮҸйў„еҠ иҪ?function preloadAll() {
  const keys = [];
  VOCAB_DATA.forEach(sec => sec.words.forEach(w => {
    if (w.noAudio) return; // TTSиҜҚдёҚйў„еҠ иҪ?    const k = w.en.toLowerCase().replace(/\s+/g, '_');
    if (!bufferCache.hasOwnProperty(k) && !loadingSet.has(k)) keys.push(k);
  }));
  keys.reduce((p, k) => p.then(() => loadBuffer(k)), Promise.resolve());
}

// TTS ж’ӯж”ҫпјҲжөҸи§ҲеҷЁиҜӯйҹіеҗҲжҲҗпј?function speakTTS(word, btn) {
  if (!('speechSynthesis' in window)) return false;
  const key = word.toLowerCase().replace(/\s+/g, '_');

  if (currentKey === key && currentTTS) {
    speechSynthesis.cancel();
    stopCurrent();
    return true;
  }
  stopCurrent();

  const utt = new SpeechSynthesisUtterance(word);
  utt.lang = 'en-US';
  utt.rate = 0.85;
  // дјҳе…ҲйҖүзҫҺејҸиӢұиҜӯеЈ°йҹ?  const voices = speechSynthesis.getVoices();
  const usVoice = voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en'));
  if (usVoice) utt.voice = usVoice;

  currentKey = key;
  currentBtn = btn;
  currentTTS = true;
  btn.classList.add('playing');

  utt.onend = () => {
    if (currentKey === key) {
      btn.classList.remove('playing');
      currentKey = null;
      currentBtn = null;
      currentTTS = false;
    }
  };
  utt.onerror = () => {
    btn.classList.remove('playing');
    btn.classList.add('error');
    setTimeout(() => btn.classList.remove('error'), 600);
    currentKey = null;
    currentBtn = null;
    currentTTS = false;
  };
  speechSynthesis.speak(utt);
  return true;
}

// ж ёеҝғпјҡж’ӯж”?еҒңжӯўпјҲдјҳе…Ҳзңҹдәәйҹійў?вҶ?TTSе…ңеә•пј?async function speak(word, btn) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const key = word.toLowerCase().replace(/\s+/g, '_');

  // еҰӮжһңзӮ№зҡ„жҳҜжӯЈеңЁж’ӯж”ҫзҡ„жҢүй’® вҶ?еҒңжӯў
  if (currentKey === key && (currentSource || currentTTS)) {
    if (currentTTS) speechSynthesis.cancel();
    stopCurrent();
    return;
  }
  stopCurrent();

  // жҹҘжүҫиҜҘиҜҚжқ?  const entry = VOCAB_DATA.flatMap(s => s.words).find(w => w.en.toLowerCase().replace(/\s+/g,'_') === key);

  // noAudio ж Үи®° вҶ?зӣҙжҺҘз”?TTS
  if (entry && entry.noAudio) {
    speakTTS(word, btn);
    return;
  }

  // е°қиҜ•зңҹдәәйҹійў‘
  btn.classList.add('loading');
  const buf = await loadBuffer(key);
  btn.classList.remove('loading');

  if (buf) {
    const source = audioCtx.createBufferSource();
    source.buffer = buf;
    source.connect(audioCtx.destination);
    source.onended = () => {
      if (currentKey === key) {
        btn.classList.remove('playing');
        currentSource = null;
        currentBtn = null;
        currentKey = null;
      }
    };
    source.start(0);
    currentSource = source;
    currentBtn = btn;
    currentKey = key;
    btn.classList.add('playing');
  } else {
    // зңҹдәәйҹійў‘дёҚеӯҳең?вҶ?TTS е…ңеә•
    if (!speakTTS(word, btn)) {
      btn.classList.add('error');
      setTimeout(() => btn.classList.remove('error'), 600);
    }
  }
}

// еҸҳеҪўиҜҚеҸ‘йҹіпјҲдјҳе…Ҳзңҹдәәйҹійў‘пјҢTTSе…ңеә•пј?async function speakIrr(word, btn) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const key = word.toLowerCase().replace(/\s+/g, '_');
  if (currentKey === key && (currentSource || currentTTS)) {
    if (currentTTS) speechSynthesis.cancel();
    stopCurrent();
    return;
  }
  stopCurrent();
  btn.classList.add('loading');
  const buf = await loadBuffer(key);
  btn.classList.remove('loading');
  if (buf) {
    const source = audioCtx.createBufferSource();
    source.buffer = buf;
    source.connect(audioCtx.destination);
    source.onended = () => {
      if (currentKey === key) { btn.classList.remove('playing'); currentSource = null; currentBtn = null; currentKey = null; }
    };
    source.start(0);
    currentSource = source;
    currentBtn = btn;
    currentKey = key;
    btn.classList.add('playing');
  } else {
    if (!speakTTS(word, btn)) {
      btn.classList.add('error');
      setTimeout(() => btn.classList.remove('error'), 600);
    }
  }
}

function stopCurrent() {
  if (currentSource) {
    try { currentSource.stop(); } catch(e) {}
    currentSource = null;
  }
  if (currentTTS) {
    speechSynthesis.cancel();
    currentTTS = false;
  }
  if (currentBtn) currentBtn.classList.remove('playing');
  currentBtn = null;
  currentKey = null;
}

function toggleZh(id, btn) {
  const enEl = document.getElementById(id + '-en');
  const zhEl = document.getElementById(id + '-zh');
  if (!enEl || !zhEl) return;
  const showingEn = enEl.style.display !== 'none';
  if (showingEn) {
    enEl.style.display = 'none';
    zhEl.style.display = '';
  } else {
    enEl.style.display = '';
    zhEl.style.display = 'none';
  }
}

function posPriority(pos) {
  const p = (pos||'').toLowerCase().trim();
  if (p.startsWith('n')) return 1;
  if (p.startsWith('v') || p.startsWith('modal')) return 2;
  if (p.startsWith('adj')) return 3;
  if (p.startsWith('adv') || p.startsWith('prep')) return 4;
  if (p === 'phrase') return 5;
  return 6;
}
function sortByPos(words) { return [...words].sort((a,b) => posPriority(a.pos)-posPriority(b.pos)); }

function formatIrrTag(irr) {
  if (!irr) return '';
  const irrBtn = word => `<button class="irr-speak-btn" onclick="speakIrr('${word}',this)" title="ж’ӯж”ҫ ${word}">рҹ”Ҡ</button>`;
  if (irr.includes('|')) {
    const parts = irr.split('|');
    const pastRaw = parts[0].replace('иҝҮеҺ»:', '');
    const ppRaw = parts[1].replace('иҝҮеҲҶ:', '');
    const splitWP = s => { const m = s.match(/^(.+?)(\s+\/.+\/)$/); return m ? {w:m[1], p:m[2]} : {w:s, p:''}; };
    const past = splitWP(pastRaw);
    const pp = splitWP(ppRaw);
    const ph = s => s.p ? `<span class="irr-phonetic">${s.p}</span>` : '';
    return `<span class="irr-badge"><span class="irr-label">иҝҮеҺ»еј?/span><span class="irr-forms">${past.w}${ph(past)}</span>${irrBtn(past.w)}</span> <span class="irr-badge"><span class="irr-label">иҝҮеҺ»еҲҶиҜҚ</span><span class="irr-forms">${pp.w}${ph(pp)}</span>${irrBtn(pp.w)}</span>`;
  }
  // might: "mayзҡ„иҝҮеҺ»ејҸ"
  const mayMatch = irr.match(/^(.+)зҡ„иҝҮеҺ»ејҸ$/);
  if (mayMatch) return `<span class="irr-badge"><span class="irr-label">вҡ?/span><span class="irr-forms">${irr}</span>${irrBtn(mayMatch[1])}</span>`;
  return `<span class="irr-badge"><span class="irr-label">вҡ?/span><span class="irr-forms">${irr}</span>${irrBtn(irr.split('/')[0].trim())}</span>`;
}

        const compoundTag = w.compound ? '<span class="compound-tag">рҹ”—</span>' : '';

        const zhId = `zh-${i}-${w.en.replace(/\s+/g,'-')}`;
        return `<tr>
          <td class="td-num">${i+1}</td>
          <td><div class="word-cell">${audioBtn}${w.en}${compoundTag}${ttsTag}</div></td>
          <td class="phonetic">${w.phonetic}</td>

        </tr>`;
      }).join('');
      d.innerHTML += `<table class="desk-table"><thead><tr><th>#</th><th>рҹ”Ҡ еҚ•иҜҚ</th><th>йҹіж Ү</th><th>иҜҚжҖ?/th><th>еҗ«д№ү</th><th>дҫӢеҸҘ</th></tr></thead><tbody>${rows}</tbody></table>`;
    }
    c.appendChild(d);
  });

  document.getElementById('stats').textContent =
    q ? `е…?${total} иҜҚпјҢеҢ№й…Қ "${filter}" жҳҫзӨә ${shown} иҜҚ` : `е…?${total} иҜҚ`;
  if (!shown) c.innerHTML = '<div class="no-results">жІЎжңүжүҫеҲ°еҢ№й…Қзҡ„еҚ•иҜ?рҹҳў</div>';
}

function buildCalendar() {

    const card = document.createElement('div');
    card.className = 'cal-card';

/* ===== жөӢйӘҢйҹіж•ҲпјҲWeb Audio API еҗҲжҲҗпј?==== */
function playCorrectSound() {
  try {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const now = audioCtx.currentTime;
    // дёҠиЎҢдёүйҹіе’ҢејҰ C5вҶ’E5вҶ’G5
    [523.25, 659.25, 783.99].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.15, now + i * 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.3);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now + i * 0.08);
      osc.stop(now + i * 0.08 + 0.35);
    });
  } catch(e) {}
}

function playWrongSound() {
  try {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(220, now);
    osc.frequency.linearRampToValueAtTime(180, now + 0.25);
    gain.gain.setValueAtTime(0.12, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.35);
  } catch(e) {}
}

/* ===== й”ҷйўҳи®°еҪ•жң¬пјҲlocalStorage жҢҒд№…еҢ–пјү===== */
const MISTAKE_KEY = 'vocab_mistakes_v1';

function loadMistakes() {
  try {
    return JSON.parse(localStorage.getItem(MISTAKE_KEY)) || {};
  } catch(e) { return {}; }
}

function saveMistakes(data) {
  try { localStorage.setItem(MISTAKE_KEY, JSON.stringify(data)); } catch(e) {}
}

// и®°еҪ•дёҖж¬Ўй”ҷиҜ?function recordMistake(wordEn) {
  const data = loadMistakes();
  if (!data[wordEn]) data[wordEn] = { count: 0, firstAt: Date.now(), lastAt: Date.now(), correctAfterWrong: 0 };
  data[wordEn].count++;
  data[wordEn].lastAt = Date.now();
  data[wordEn].correctAfterWrong = 0; // йҮҚзҪ®иҝһз»ӯжӯЈзЎ®и®Ўж•°
  saveMistakes(data);
}

// и®°еҪ•дёҖж¬ЎжӯЈзЎ®пјҲиҝһз»ӯжӯЈзЎ®и®Ўж•°пјҢз”ЁдәҺеҲӨж–ӯжҳҜеҗ?е·ІжҺҢжҸ?пј?function recordCorrect(wordEn) {
  const data = loadMistakes();
  if (data[wordEn]) {
    data[wordEn].correctAfterWrong = (data[wordEn].correctAfterWrong || 0) + 1;
    data[wordEn].lastCorrectAt = Date.now();
    saveMistakes(data);
  }
}

// иүҫе®ҫжө©ж–ҜйҒ—еҝҳжӣІзәҝеҲҶжһҗпјҡиҝ”еӣһйңҖиҰҒеӨҚд№ зҡ„иҜҚпјҢжҢүзҙ§жҖҘзЁӢеәҰжҺ’еә?function analyzeMistakes() {
  const data = loadMistakes();
  const allWords = getAllWords();
  const now = Date.now();
  const results = [];

  Object.keys(data).forEach(en => {
    const m = data[en];
    const word = allWords.find(w => w.en === en);
    if (!word) return;

    // йҒ—еҝҳжӣІзәҝеӨҚд№ й—ҙйҡ”пјҲе°Ҹж—¶пјүпј?h, 8h, 1d, 2d, 4d, 7d, 15d, 30d
    const intervals = [1, 8, 24, 48, 96, 168, 360, 720];
    const stage = Math.min(m.correctAfterWrong || 0, intervals.length - 1);
    const reviewInterval = intervals[stage] * 3600000; // иҪ¬жҜ«з§?
    const timeSinceLastCorrect = m.lastCorrectAt ? (now - m.lastCorrectAt) : (now - m.firstAt);
    const timeSinceLastMistake = now - m.lastAt;
    const overdue = timeSinceLastMistake > reviewInterval;

    // зҶҹз»ғеәҰиҜ„еҲ?0-100пјҲи¶Ҡй«ҳи¶ҠзҶҹз»ғпј?    let mastery = 0;
    if (m.count === 0) { mastery = 100; }
    else {
      // еҹәзЎҖеҲҶпјҡй”ҷиҜҜи¶ҠеӨҡеҲҶи¶ҠдҪ?      const errorPenalty = Math.min(m.count * 15, 60);
      // иҝһз»ӯжӯЈзЎ®еҠ еҲҶ
      const streakBonus = Math.min((m.correctAfterWrong || 0) * 12, 36);
      // ж—¶й—ҙиЎ°еҮҸпјҡдёҠж¬Ўй”ҷиҜҜи¶Ҡд№…пјҢзЁҚеҫ®жҒўеӨҚ
      const hoursSince = timeSinceLastMistake / 3600000;
      const decayRecovery = Math.min(hoursSince * 0.3, 10);
      mastery = Math.max(0, Math.min(100, 100 - errorPenalty + streakBonus + decayRecovery));
    }

    // зҙ§жҖҘеәҰпјҡйңҖиҰҒеӨҚд№ зҡ„зЁӢеәҰпј?-100пј?    let urgency = 0;
    if (m.count > 0) {
      if (overdue || !m.lastCorrectAt) {
        urgency = Math.min(100, 40 + m.count * 10 + (overdue ? 30 : 0));
      } else {
        const progressRatio = timeSinceLastCorrect / reviewInterval;
        urgency = Math.min(100, progressRatio * 60 + m.count * 5);
      }
    }

    results.push({
      word,
      mistakes: m,
      mastery: Math.round(mastery),
      urgency: Math.round(urgency),
      stage,
      overdue,
      reviewDue: m.lastCorrectAt ? new Date(m.lastCorrectAt + reviewInterval) : null,
    });
  });

  // жҢүзҙ§жҖҘеәҰйҷҚеәҸжҺ’еҲ—
  results.sort((a, b) => b.urgency - a.urgency);
  return results;
}

function getAllWords() {

// жҙ—зүҢ
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

// д»?allWords дёӯеҸ– n дёӘдёҚеҗҢдәҺ correctWord зҡ„е№Іжү°йЎ№
function pickDistractors(allWords, correctWord, n) {
  const pool = allWords.filter(w => w.en !== correctWord.en);
  return shuffle(pool).slice(0, n);
}


// д»Һеҗ«д№үдёӯз§»йҷӨеҚ•иҜҚжң¬иә«пјҲйҳІжі„йңІпј?function cleanMeaningForQuiz(meaning, wordEn) {
  let clean = meaning;
  const parts = wordEn.toLowerCase().split(/\s+/);
  parts.forEach(p => {
    if (p.length <= 2) return;
    // Use indexOf for simple substring replacement (no regex escaping issues)
    const lower = clean.toLowerCase();
    let idx = lower.indexOf(p);
    while (idx >= 0) {
      // Check word boundaries
      const beforeOk = idx === 0 || /[^a-zA-Z]/.test(clean[idx - 1]);
      const afterIdx = idx + p.length;
      const afterOk = afterIdx >= clean.length || /[^a-zA-Z]/.test(clean[afterIdx]);
      if (beforeOk && afterOk) {
        clean = clean.substring(0, idx) + '____' + clean.substring(afterIdx);
      }
      idx = lower.indexOf(p, idx + 1);
    }
  });
  return clean;
}

// з”ҹжҲҗйўҳзӣ®
function generateQuestions(mode, words, count) {
  const all = getAllWords();
  const picked = shuffle(words).slice(0, Math.min(count, words.length));
  return picked.map(w => {
    const q = { word: w, mode };
    if (mode === 'spell') return q; // жӢјеҶҷжЁЎејҸдёҚйңҖиҰҒйҖүйЎ№
    if (mode === 'listenSpell') {
      // еҗ¬еЈ°й»ҳеҶҷпјҡдёҚйңҖиҰҒйў„и®ҫйҖүйЎ№пјҲе…ҲжӢјеҶҷпјҢеҶҚйҖүеҗ«д№үпјү
      // еҗ«д№үйҖүйЎ№пј?йҖ?
      const meaningDistractors = pickDistractors(all, w, 4);
      q.meaningOptions = shuffle([w, ...meaningDistractors].map(x => ({
        display: cleanMeaningForQuiz(x.meaning.replace(/[вқ¶вқ·вқёвқ№вқә]/g, '').trim(), x.en),
        key: x.en
      })));
      return q;
    }
    const distractors = pickDistractors(all, w, 3);
    let options;
    if (mode === 'en2zh') {
      options = shuffle([w, ...distractors].map(x => ({ display: cleanMeaningForQuiz(x.meaning.replace(/[вқ¶вқ·вқёвқ№вқә]/g, '').trim(), x.en), key: x.en })));
    } else if (mode === 'zh2en') {
      options = shuffle([w, ...distractors].map(x => ({ display: x.en, key: x.en })));
    } else if (mode === 'listen') {
      options = shuffle([w, ...distractors].map(x => ({ display: x.en, key: x.en })));
    } else if (mode === 'root') {
      // иҜҚж №жЁЎејҸпјҡе№Іжү°йЎ№д№ҹйңҖиҰҒжңүroot
      const rootPool = all.filter(x => x.root && x.en !== w.en);
      const rootDist = shuffle(rootPool).slice(0, 3);
      const fill = rootDist.length < 3 ? [...distractors.slice(0, 3-rootDist.length)] : [];
      options = shuffle([w, ...rootDist, ...fill].slice(0,4).map(x => ({ display: x.en, key: x.en })));
    }
    // жЈҖжҹҘиҜҚж №жҸҗзӨәжҳҜеҗҰжі„йңІзӯ”жЎҲпјҡжҸҗзӨәдёӯеҢ…еҗ«еҚ•иҜҚжң¬иә«зҡ„е°ұдёҚйҖӮеҗҲеҮәйўҳ
    const firstArrow = w.root.indexOf('\u2192');
    const rootHint = firstArrow > 0 ? w.root.substring(0, firstArrow).trimEnd() : w.root;
    const wordParts = w.en.toLowerCase().split(/\s+/).filter(sw => sw.length > 2);
    const rootLeaks = wordParts.some(sw => rootHint.toLowerCase().includes(sw));
    if (rootLeaks && mode === 'root') { q._rootLeaks = true; }
    q.options = options;
    return q;
  });
}

    questionHTML = `
      <div class="qq-prompt">ж №жҚ®иҜҚж №жӢҶи§ЈпјҢиҝҷжҳҜе“ӘдёӘеҚ•иҜҚпјҹ</div>
      <div class="qq-hint" style="font-size:1.15em;color:#764ba2;font-style:normal;font-weight:700;margin:8px 0">${rootHint}</div>
    `;
  } else if (q.mode === 'spell') {
    const spellMeaning = cleanMeaningForQuiz(w.meaning, w.en);
    questionHTML = `
      <div class="qq-prompt">жӢјеҮәиҝҷдёӘеҚ•иҜҚ</div>
      <div class="qq-word" style="font-size:1.2em">${spellMeaning}</div>
      ${w.pos ? `<div style="margin-top:4px"><span class="pos">${w.pos}</span></div>` : ''}
    `;
  } else if (q.mode === 'listenSpell') {
    questionHTML = `
      <div class="qq-prompt">рҹҺ§ еҗ¬еҸ‘йҹіпјҢжӢјеҮәиҝҷдёӘеҚ•иҜҚ</div>
      <button class="qq-listen-btn" id="quizListenBtn" onclick="quizPlayAudio('${w.en.replace(/'/g,"\\\\'")}',this)">рҹ”Ҡ</button>
      <div style="margin-top:10px">
        <input type="text" class="quiz-spell-input" id="quizSpellInput" placeholder="иҫ“е…ҘеҚ•иҜҚ..." autocomplete="off" autocapitalize="off" spellcheck="false">
      </div>
      <div id="listenSpellMeanings"></div>
    `;
  }

  let optionsHTML = '';
  if (q.mode === 'spell') {
    optionsHTML = `
      <div style="margin-top:14px">
        <input type="text" class="quiz-spell-input" id="quizSpellInput" placeholder="иҫ“е…ҘеҚ•иҜҚ..." autocomplete="off" autocapitalize="off" spellcheck="false">
        <div class="quiz-spell-hint" id="quizSpellHint"></div>
        <button class="quiz-next-btn" onclick="checkSpell()">зЎ®и®Ө</button>
      </div>
    `;
  } else if (q.mode === 'listenSpell') {
    // еҗ¬еЈ°й»ҳеҶҷпјҡе…ҲжӢјеҶҷпјҢйҖүйЎ№еңЁжӢјеҶҷеҗҺз”?showListenSpellMeaningOptions еҠЁжҖҒжҸ’е…?    optionsHTML = '';
  } else {
    optionsHTML = `
      <div class="quiz-options">
        ${q.options.map((opt, i) => `
          <div class="quiz-opt" data-key="${opt.key}" onclick="selectOption(this)">${String.fromCharCode(65+i)}. ${opt.display}</div>
        `).join('')}
      </div>
    `;
  }

  el.innerHTML = `
    <div class="quiz-top">
      <button class="quiz-back-arrow" onclick="if(confirm('йҖҖеҮәжөӢйӘҢпјҹеҪ“еүҚиҝӣеәҰе°ҶдёўеӨ?)){renderQuizHome()}">вҶ?/button>
      <h2>${QUIZ_MODES.find(m=>m.id===q.mode).icon} з¬?${idx+1}/${total} йў?/h2>
      <button class="quiz-close-btn" onclick="closeQuiz()">вң?/button>
    </div>
    <div class="quiz-progress">
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${progress}%"></div></div>
      <span class="quiz-progress-text">${idx+1}/${total}</span>
      <span class="quiz-score-live">вң?${score}</span>
    </div>
    <div class="quiz-question">
      ${questionHTML}
      ${optionsHTML}
    </div>
    <button class="quiz-next-btn" id="quizNextBtn" style="display:none" onclick="nextQuestion()">дёӢдёҖйў?вҶ?/button>
  `;

  // жӢјеҶҷжЁЎејҸиҮӘеҠЁиҒҡз„Ұ
  if (q.mode === 'spell') {
    setTimeout(() => {
      const input = document.getElementById('quizSpellInput');
      if (input) {
        input.focus();
        input.addEventListener('keydown', e => { if (e.key === 'Enter') checkSpell(); });
      }
    }, 100);
  }

  // еҗ¬еЈ°й»ҳеҶҷжЁЎејҸпјҡиҮӘеҠЁж’ӯж”?иҒҡз„Ұ+еӣһиҪҰ
  if (q.mode === 'listenSpell') {
    setTimeout(() => {
      const input = document.getElementById('quizSpellInput');
      if (input) {
        input.focus();
        input.addEventListener('keydown', e => { if (e.key === 'Enter') checkListenSpell(); });
      }
      const btn = document.getElementById('quizListenBtn');
      if (btn) quizPlayAudio(w.en, btn);
    }, 300);
  }

  // еҗ¬йҹіжЁЎејҸиҮӘеҠЁж’ӯж”ҫ
  if (q.mode === 'listen') {
    setTimeout(() => {
      const btn = document.getElementById('quizListenBtn');
      if (btn) quizPlayAudio(w.en, btn);
    }, 300);
  }
}

function quizPlayAudio(word, btn) {
  if (btn) btn.classList.add('playing');
  speak(word, {
    classList: {
      add: c => { if (btn) btn.classList.add(c); },
      remove: c => { if (btn) btn.classList.remove(c); }
    }
  });
  setTimeout(() => { if (btn) btn.classList.remove('playing'); }, 1500);
}

function selectOption(el) {
  if (quizState.answered) return;
  quizState.answered = true;
  const q = quizState.questions[quizState.idx];
  const selected = el.dataset.key;
  const correct = q.word.en;

  // ж Үи®°жүҖжңүйҖүйЎ№
  document.querySelectorAll('.quiz-opt').forEach(opt => {
    opt.classList.add('disabled');
    if (opt.dataset.key === correct) opt.classList.add('show-correct');
  });

  if (selected === correct) {
    el.classList.add('correct');
    quizState.score++;
    playCorrectSound();
  } else {
    el.classList.add('wrong');
    quizState.wrong.push({ word: q.word, yourAnswer: el.textContent.replace(/^[A-D]\.\s*/, '') });
    playWrongSound();
  }

  document.getElementById('quizNextBtn').style.display = '';
  // жӣҙж–°е®һж—¶еҲҶж•°
  document.querySelector('.quiz-score-live').textContent = `вң?${quizState.score}`;
  // и®°еҪ•зӯ”йўҳз»“жһңеҲ°й”ҷйўҳжң¬
  if (selected === correct) { recordCorrect(q.word.en); } else { recordMistake(q.word.en); }
  // дёҚиҮӘеҠЁи·іиҪ¬пјҢйңҖжүӢеҠЁзӮ№еҮ»
}

function checkSpell() {
  if (quizState.answered) return;
  const input = document.getElementById('quizSpellInput');
  const hint = document.getElementById('quizSpellHint');
  if (!input) return;
  const q = quizState.questions[quizState.idx];
  const answer = input.value.trim().toLowerCase();
  const correct = q.word.en.toLowerCase();

  quizState.answered = true;
  if (answer === correct) {
    input.classList.add('correct');
    hint.textContent = 'вң?жӯЈзЎ®пј?;
    hint.className = 'quiz-spell-hint correct';
    quizState.score++;
    playCorrectSound();
  } else {
    input.classList.add('wrong');
    hint.innerHTML = `вқ?жӯЈзЎ®зӯ”жЎҲ: <strong>${q.word.en}</strong>`;
    hint.className = 'quiz-spell-hint wrong';
    quizState.wrong.push({ word: q.word, yourAnswer: input.value.trim() });
    playWrongSound();
  }
  document.getElementById('quizNextBtn').style.display = '';
  document.querySelector('.quiz-score-live').textContent = `вң?${quizState.score}`;
  // и®°еҪ•зӯ”йўҳз»“жһңеҲ°й”ҷйўҳжң¬
  if (answer === correct) { recordCorrect(q.word.en); } else { recordMistake(q.word.en); }
  // дёҚиҮӘеҠЁи·іиҪ¬пјҢйңҖжүӢеҠЁзӮ№еҮ»
}

// еҗ¬еЈ°й»ҳеҶҷпјҡе…ҲжӢјеҶҷпјҢеҶҚйҖүеҗ«д№?function checkListenSpell() {
  if (quizState.answered) return;
  const input = document.getElementById('quizSpellInput');
  if (!input) return;
  const q = quizState.questions[quizState.idx];
  const answer = input.value.trim().toLowerCase();
  const correct = q.word.en.toLowerCase();

  if (answer !== correct) {
    // жӢјеҶҷй”ҷиҜҜпјҢзӣҙжҺҘеҲӨй”?    quizState.answered = true;
    input.classList.add('wrong');
    playWrongSound();
    quizState.wrong.push({ word: q.word, yourAnswer: 'жӢјеҶҷй”ҷиҜҜ: ' + input.value.trim() });
    recordMistake(q.word.en);

    // жҳҫзӨәжӯЈзЎ®зӯ”жЎҲе’Ңеҗ«д№үйҖүйЎ№пјҲдҪҶе·ІеҲӨй”ҷпјҢйҖүжӢ©еҸӘжҳҜеӯҰд№ пј?    showListenSpellMeaningOptions(q, true);
    document.getElementById('quizNextBtn').style.display = '';
    document.querySelector('.quiz-score-live').textContent = 'вң?' + quizState.score;
    return;
  }

  // жӢјеҶҷжӯЈзЎ®пјҢиҝӣе…Ҙз¬¬дәҢйҳ¶ж®өпјҡйҖүеҗ«д№?  input.classList.add('correct');
  input.disabled = true;
  playCorrectSound();

  showListenSpellMeaningOptions(q, false);
}

function showListenSpellMeaningOptions(q, alreadyWrong) {
  const w = q.word;
  const optionsHTML = q.meaningOptions.map((opt, i) => {
    const letter = String.fromCharCode(65 + i);
    return '<div class="quiz-opt" data-key="' + opt.key + '" onclick="selectListenSpellMeaning(this,' + (alreadyWrong ? 'true' : 'false') + ')">' + letter + '. ' + opt.display + '</div>';
  }).join('');

  const container = document.getElementById('listenSpellMeanings');
  if (container) {
    container.innerHTML = '<div class="qq-prompt" style="margin-top:14px;margin-bottom:8px">йҖүжӢ©жӯЈзЎ®зҡ„еҗ«д№үпјҡ</div><div class="quiz-options">' + optionsHTML + '</div>';
  }
}

function selectListenSpellMeaning(el, alreadyWrong) {
  if (quizState.answered && !alreadyWrong) return;
  quizState.answered = true;
  const q = quizState.questions[quizState.idx];
  const selected = el.dataset.key;
  const correct = q.word.en;

  document.querySelectorAll('.quiz-opt').forEach(opt => {
    opt.classList.add('disabled');
    if (opt.dataset.key === correct) opt.classList.add('show-correct');
  });

  if (selected === correct && !alreadyWrong) {
    el.classList.add('correct');
    quizState.score++;
    playCorrectSound();
    recordCorrect(q.word.en);
  } else {
    el.classList.add('wrong');
    if (!alreadyWrong) {
      quizState.wrong.push({ word: q.word, yourAnswer: 'еҗ«д№үйҖүй”ҷ' });
      recordMistake(q.word.en);
    }
    playWrongSound();
  }

  document.getElementById('quizNextBtn').style.display = '';
  document.querySelector('.quiz-score-live').textContent = 'вң?' + quizState.score;
}

function nextQuestion() {
  if (quizState._autoNext) { clearTimeout(quizState._autoNext); quizState._autoNext = null; }
  quizState.idx++;
  if (quizState.idx >= quizState.questions.length) {
    renderQuizResult();
  } else {
    renderQuizQuestion();
  }
}

function renderQuizResult() {
  const { questions, score, wrong, mode } = quizState;
  const total = questions.length;
  const pct = Math.round(score / total * 100);
  const modeInfo = QUIZ_MODES.find(m => m.id === mode);

  let msg = '';
  if (pct === 100) msg = 'рҹҸҶ е®ҢзҫҺпјҒдёҖдёӘжІЎй”ҷпјҒ';
  else if (pct >= 90) msg = 'рҹҢҹ еӨӘжЈ’дәҶпјҒеҮ д№Һе…ЁеҜ№пј?;
  else if (pct >= 70) msg = 'рҹ‘Қ дёҚй”ҷпјҢз»§з»ӯеҠ жІ№пјҒ';
  else if (pct >= 50) msg = 'рҹ’Ә иҝҳйңҖеҠӘеҠӣпјҢеӨҡеӨҚд№ й”ҷиҜҚпј?;
  else msg = 'рҹ“– е»әи®®еӣһзңӢеҚ•иҜҚиЎЁеҶҚжөӢдёҖж¬?;

  const el = document.getElementById('quizInner');
  el.innerHTML = `
    <div class="quiz-top">
      <h2>${modeInfo.icon} жөӢйӘҢз»“жһң</h2>
      <button class="quiz-close-btn" onclick="closeQuiz()">вң?/button>
    </div>
    <div class="quiz-result">
      <div class="qr-score">${score}/${total}</div>
      <div class="qr-label">жӯЈзЎ®зҺ?${pct}%</div>
      <div class="qr-msg">${msg}</div>
      ${wrong.length ? `
        <div class="quiz-wrong-list">
          <h3>вқ?й”ҷиҜҚеӣһйЎҫ (${wrong.length})</h3>
          ${wrong.map(w => `
            <div class="quiz-wrong-item">
              <div class="qwi-word">${w.word.en} <span class="phonetic">${w.word.phonetic}</span></div>
              <div class="qwi-meaning">${w.word.meaning}</div>
              <div class="qwi-yours">дҪ зҡ„зӯ”жЎҲ: ${w.yourAnswer}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}
      <div class="quiz-result-btns">
        <button class="quiz-retry-btn" onclick="startQuiz()">рҹ”„ еҶҚжөӢдёҖж¬?/button>
        <button class="quiz-back-btn" onclick="renderQuizHome()">рҹҸ  иҝ”еӣһ</button>
      </div>
    </div>
  `;
}

/* ===== Service WorkerпјҲеҸҜйҖүзҰ»зәҝпјү===== */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
<!-- Quiz е…ЁеұҸйЎөйқў -->
<div class="quiz-overlay" id="quizOverlay">
  <div class="quiz-inner" id="quizInner"></div>
</div>

</body>
