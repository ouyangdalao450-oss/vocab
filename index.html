<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>英语词汇本</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; overflow-x:hidden; }
body { font-family:-apple-system,"Segoe UI","Microsoft YaHei","PingFang SC",sans-serif; background:linear-gradient(180deg,#f0ebff 0%,#f8f5ff 50%,#fef9f0 100%); color:#1a1a2e; padding:12px; -webkit-text-size-adjust:100%; min-height:100vh; }

/* ===== 顶部 ===== */
.top { position:sticky; top:0; z-index:10; background:rgba(240,235,255,0.92); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); padding:12px 0 10px; border-bottom:1px solid rgba(118,75,162,0.08); }
h1 { text-align:center; font-size:1.4em; color:#2d1b69; letter-spacing:2px; margin-bottom:8px; text-shadow:0 1px 2px rgba(118,75,162,0.1); }
.search-wrap { position:relative; max-width:500px; margin:0 auto 8px; }
.search-wrap input { width:100%; padding:10px 16px 10px 38px; border:2px solid #e0d0f0; border-radius:24px; font-size:16px; outline:none; background:rgba(255,255,255,0.9); transition:all 0.3s; box-shadow:0 2px 8px rgba(118,75,162,0.06); }
.search-wrap input:focus { border-color:#764ba2; box-shadow:0 4px 16px rgba(118,75,162,0.15); background:#fff; }
.search-wrap .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:1.1em; pointer-events:none; }
.date-btn { display:flex; align-items:center; justify-content:center; gap:6px; margin:0 auto; padding:7px 20px; border:2px solid #764ba2; border-radius:20px; background:#fff; color:#764ba2; font-size:0.9em; font-weight:600; cursor:pointer; transition:all 0.2s; }
.date-btn:active { background:#f0e6ff; }
.stats { text-align:center; font-size:0.78em; color:#999; margin-top:6px; }

/* ===== 遮罩 + 日历弹窗 ===== */
.overlay { display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.45); opacity:0; transition:opacity 0.2s; }
.overlay.show { display:flex; align-items:flex-end; justify-content:center; opacity:1; }
@media (min-width:600px) { .overlay.show { align-items:center; } }
.calendar-sheet { width:100%; max-width:480px; max-height:85vh; background:#fff; border-radius:20px 20px 0 0; padding:20px 16px 24px; overflow-y:auto; transform:translateY(100%); transition:transform 0.3s cubic-bezier(0.32,0.72,0,1), opacity 0.2s; opacity:0; }
@media (min-width:600px) { .calendar-sheet { border-radius:20px; transform:translateY(0) scale(0.9); transition:transform 0.3s, opacity 0.3s; } .overlay.show .calendar-sheet { transform:translateY(0) scale(1); opacity:1; } }
.overlay.show .calendar-sheet { transform:translateY(0); opacity:1; }
.cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.cal-header h2 { font-size:1.1em; color:#2d1b69; }
.cal-close { width:32px; height:32px; border-radius:50%; border:none; background:#f0e6ff; color:#764ba2; font-size:1.2em; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.cal-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(130px,1fr)); gap:10px; }
.cal-card { background:linear-gradient(135deg,#f8f0ff,#ede4ff); border:2px solid #e8daff; border-radius:14px; padding:12px; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; }
.cal-card::before { content:''; position:absolute; top:-10px; right:-10px; width:40px; height:40px; background:#764ba220; border-radius:50%; }
.cal-card:active { transform:scale(0.97); border-color:#764ba2; }
.cal-card .cal-date { font-weight:700; font-size:0.95em; color:#2d1b69; margin-bottom:4px; }
.cal-card .cal-count { font-size:0.78em; color:#764ba2; font-weight:600; }
.cal-card .cal-words { font-size:0.72em; color:#aaa; margin-top:4px; }

/* ===== 内容区 ===== */
.content { padding-bottom:80px; }
.date-section { margin-bottom:20px; }
.date-header { font-size:1.05em; font-weight:700; color:#764ba2; padding:10px 16px; background:linear-gradient(90deg,#ede4ff,#f8f0ff); border-left:4px solid #764ba2; border-radius:0 12px 12px 0; margin-bottom:12px; display:flex; align-items:center; gap:8px; box-shadow:0 2px 8px rgba(118,75,162,0.06); }
.date-header .dh-count { font-size:0.75em; color:#aaa; font-weight:400; }

/* 桌面表格 */
.desk-table { width:100%; border-collapse:collapse; background:#fff; border-radius:14px; overflow:hidden; box-shadow:0 4px 16px rgba(118,75,162,0.07); display:table; margin-bottom:8px; }
.desk-table thead { background:linear-gradient(135deg,#7c5cbf,#9b6dd7); color:#fff; }
.desk-table { table-layout:fixed; }
.desk-table th { padding:10px 8px; text-align:left; font-size:0.84em; font-weight:600; letter-spacing:0.3px; }
.desk-table th:nth-child(1), .desk-table td.td-num { width:36px; }
.desk-table th:nth-child(2) { width:18%; }
.desk-table th:nth-child(3) { width:16%; }
.desk-table th:nth-child(4) { width:8%; }
.desk-table th:nth-child(5) { width:32%; }
.desk-table th:nth-child(6) { width:auto; }
.desk-table td { padding:10px 8px; font-size:0.9em; vertical-align:middle; border-bottom:1px solid #f0ebff; transition:background 0.15s; }
.desk-table tbody tr:hover td { background:rgba(240,230,255,0.3); }
.desk-table tr:last-child td { border-bottom:none; }
.desk-table .td-num { text-align:center; color:#764ba2; font-weight:700; width:32px; }
.desk-table .word-cell { font-weight:700; color:#16213e; display:flex; align-items:center; gap:6px; }
.desk-table .phonetic { color:#999; font-size:0.85em; }
.desk-table .pos { color:#764ba2; font-weight:600; font-size:0.8em; background:#f0e6ff; padding:2px 8px; border-radius:8px; display:inline-block; }
.desk-table .meaning { color:#333; font-size:0.9em; line-height:1.4; }
.desk-table .example { color:#888; font-size:0.84em; font-style:italic; line-height:1.4; }
.desk-table .example-zh { color:#5a8a5a; font-style:normal; font-size:0.84em; line-height:1.4; }
.toggle-zh-btn { background:none; border:1px solid #ddd; font-size:0.68em; padding:1px 7px; border-radius:10px; cursor:pointer; color:#aaa; margin-left:6px; vertical-align:middle; transition:all 0.15s; font-weight:500; }
.toggle-zh-btn:hover { border-color:#764ba2; color:#764ba2; background:#f8f0ff; }
.toggle-zh-btn.zh-mode { background:#764ba2; color:#fff; border-color:#764ba2; }
.irr-badge { display:inline-flex; align-items:center; gap:0; font-size:0.72em; margin-left:2px; margin-right:4px; vertical-align:middle; }
.irr-badge .irr-label { background:#ff6b6b; color:#fff; font-weight:700; padding:1px 6px; border-radius:4px 0 0 4px; white-space:nowrap; line-height:1.6; }
.irr-badge .irr-forms { background:#fff0f0; color:#c0392b; font-weight:600; padding:1px 6px; border-radius:0 4px 4px 0; border:1px solid #ffcccc; border-left:none; white-space:nowrap; line-height:1.6; }
.irr-phonetic { font-weight:400; font-size:0.9em; color:#e07070; margin-left:3px; font-family:"Lucida Sans Unicode",sans-serif; }
.irr-row { margin:3px 0 2px 0; }
.irr-speak-btn { background:none; border:none; font-size:1.1em; padding:1px 4px; border-radius:6px; cursor:pointer; transition:transform 0.1s; vertical-align:middle; line-height:1; }
.irr-speak-btn:active { transform:scale(0.8); }
.irr-speak-btn.playing { background:#c8a8ff; animation:pulse 0.8s ease infinite; }
.irr-badge .irr-sep { margin:0 3px; color:#e74c3c; font-weight:400; }
.speak-btn { background:none; border:none; font-size:1.3em; padding:4px 6px; border-radius:8px; cursor:pointer; transition:transform 0.1s; }
.speak-btn:active { transform:scale(0.85); }
.speak-btn.playing { background:#c8a8ff; animation:pulse 0.8s ease infinite; }
.speak-btn.loading { opacity:0.5; }
.speak-btn.error { background:#ffe0e0; }
.compound-tag { font-size:0.7em; margin-left:4px; vertical-align:middle; }
.tts-mark { font-size:0.65em; color:#764ba2; margin-left:2px; vertical-align:middle; }
.root-meaning { color:#8b6fc0; font-size:0.82em; line-height:1.4; margin-top:3px; font-style:italic; }
.root-meaning::before { content:'💡 '; }

/* 手机卡片 */
.mobile-cards { display:none; flex-direction:column; gap:9px; }
.vocab-card { background:rgba(255,255,255,0.95); border-radius:16px; padding:14px 16px; box-shadow:0 4px 14px rgba(118,75,162,0.08); border-left:4px solid #764ba2; transition:all 0.2s; backdrop-filter:blur(4px); }
.vocab-card:hover { box-shadow:0 6px 20px rgba(118,75,162,0.12); transform:translateY(-1px); }
.vocab-card .card-top { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.vocab-card .card-num { color:#764ba2; font-weight:700; font-size:0.82em; min-width:22px; }
.vocab-card .card-speak { background:none; border:none; font-size:1.7em; padding:2px 6px; cursor:pointer; border-radius:10px; line-height:1; transition:transform 0.1s; }
.vocab-card .card-speak:active { transform:scale(0.85); }
.vocab-card .card-speak.playing { background:#c8a8ff; animation:pulse 0.8s ease infinite; }
.vocab-card .card-speak.loading { opacity:0.5; }
.vocab-card .card-speak.error { background:#ffe0e0; }
.vocab-card .card-word { font-weight:700; font-size:1.15em; color:#16213e; }
.vocab-card .card-phonetic { color:#aaa; font-size:0.82em; font-family:"Lucida Sans Unicode",sans-serif; margin-left:2px; }
.vocab-card .card-pos { display:inline-block; color:#764ba2; font-weight:600; font-size:0.78em; background:#f0e6ff; padding:2px 10px; border-radius:10px; margin-bottom:5px; }
.vocab-card .card-meaning { color:#333; font-size:0.92em; line-height:1.45; margin-bottom:4px; }
.vocab-card .card-root { color:#8b6fc0; font-size:0.82em; line-height:1.4; margin-top:2px; font-style:italic; }
.vocab-card .card-root::before { content:'💡 '; }
.vocab-card .card-example { color:#999; font-size:0.82em; font-style:italic; line-height:1.4; }
.vocab-card .card-example-zh { color:#5a8a5a; font-style:normal; font-size:0.82em; line-height:1.4; }
.vocab-card .card-irr { margin:4px 0 2px 0; }
.vocab-card .irr-badge { font-size:0.76em; }
.card-toggle-zh { background:none; border:1px solid #ddd; font-size:0.68em; padding:1px 7px; border-radius:10px; cursor:pointer; color:#aaa; margin-left:6px; vertical-align:middle; transition:all 0.15s; font-weight:500; }
.card-toggle-zh:hover { border-color:#764ba2; color:#764ba2; background:#f8f0ff; }
.card-toggle-zh.zh-mode { background:#764ba2; color:#fff; border-color:#764ba2; }

/* ===== 响应式 ===== */
@keyframes pulse {
  0%, 100% { transform:scale(1); }
  50% { transform:scale(1.15); }
}
@media (max-width:768px) {
  .desk-table { display:none !important; }
  .mobile-cards { display:flex !important; }
}
@media (min-width:769px) {
  .mobile-cards { display:none !important; }
  body { padding:20px; }
  .top { padding:16px 0 12px; }
  h1 { font-size:1.6em; }
}

/* ===== Quiz 测验系统 ===== */
.quiz-btn { display:inline-flex; align-items:center; gap:5px; margin:0 auto; padding:7px 20px; border:2px solid #e67e22; border-radius:20px; background:#fff; color:#e67e22; font-size:0.9em; font-weight:600; cursor:pointer; transition:all 0.2s; margin-top:6px; }
.quiz-btn:active { background:#fef3e2; }

/* Quiz 全屏遮罩 */
.quiz-overlay { display:none; position:fixed; inset:0; z-index:200; background:#f5f0ff; overflow-y:auto; }
.quiz-overlay.active { display:block; }
.quiz-overlay .quiz-inner { max-width:640px; margin:0 auto; padding:16px; min-height:100vh; }

/* Quiz 顶部 */
.quiz-top { display:flex; align-items:center; justify-content:space-between; padding:8px 0 12px; border-bottom:2px solid #ede4ff; margin-bottom:16px; }
.quiz-top h2 { font-size:1.2em; color:#2d1b69; }
.quiz-close-btn { width:36px; height:36px; border-radius:50%; border:none; background:#f0e6ff; color:#764ba2; font-size:1.3em; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.quiz-close-btn:active { background:#e0d0ff; }

/* Quiz 模式选择页 */
.quiz-modes { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
.quiz-mode-card { background:rgba(255,255,255,0.95); border:2px solid #e8daff; border-radius:16px; padding:18px 14px; text-align:center; cursor:pointer; transition:all 0.25s; box-shadow:0 3px 10px rgba(118,75,162,0.06); }
.quiz-mode-card:hover { transform:translateY(-3px); box-shadow:0 8px 20px rgba(118,75,162,0.12); border-color:#764ba2; }
.quiz-mode-card:active { transform:scale(0.97); border-color:#764ba2; }
.quiz-mode-card .qmc-icon { font-size:2em; margin-bottom:8px; }
.quiz-mode-card .qmc-title { font-weight:700; color:#2d1b69; font-size:0.95em; margin-bottom:4px; }
.quiz-mode-card .qmc-desc { font-size:0.75em; color:#999; line-height:1.3; }

/* Quiz 设置区 */
.quiz-setup { margin-top:20px; background:#fff; border-radius:16px; padding:20px; border:2px solid #e8daff; }
.quiz-setup h3 { font-size:1em; color:#2d1b69; margin-bottom:12px; }
.quiz-range { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
.quiz-range-btn { padding:7px 16px; border:2px solid #ddd; border-radius:20px; background:#fff; font-size:0.85em; cursor:pointer; transition:all 0.15s; font-weight:600; color:#666; }
.quiz-range-btn.selected { border-color:#764ba2; background:#764ba2; color:#fff; }
.quiz-count-row { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
.quiz-count-row label { font-size:0.9em; color:#555; font-weight:600; }
.quiz-count-row input[type=range] { flex:1; accent-color:#764ba2; }
.quiz-count-row .count-val { font-weight:700; color:#764ba2; min-width:28px; text-align:center; }
.quiz-start-btn { width:100%; padding:14px; border:none; border-radius:14px; background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; font-size:1.1em; font-weight:700; cursor:pointer; transition:all 0.25s; letter-spacing:1px; box-shadow:0 4px 14px rgba(118,75,162,0.25); }
.quiz-start-btn:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(118,75,162,0.35); }
.quiz-start-btn:active { transform:scale(0.98); opacity:0.9; }

/* Quiz 答题中 */
.quiz-progress { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
.quiz-progress-bar { flex:1; height:8px; background:#ede4ff; border-radius:4px; overflow:hidden; }
.quiz-progress-fill { height:100%; background:linear-gradient(90deg,#667eea,#764ba2); border-radius:4px; transition:width 0.4s; }
.quiz-progress-text { font-size:0.82em; color:#999; font-weight:600; white-space:nowrap; }
.quiz-score-live { font-size:0.82em; color:#27ae60; font-weight:700; }

/* 题目卡 */
.quiz-question { background:rgba(255,255,255,0.97); border-radius:18px; padding:22px; margin-bottom:14px; box-shadow:0 4px 16px rgba(118,75,162,0.08); border:2px solid #e8daff; backdrop-filter:blur(4px); }
.quiz-question .qq-prompt { font-size:1.05em; color:#2d1b69; font-weight:700; margin-bottom:6px; }
.quiz-question .qq-word { font-size:1.8em; color:#16213e; font-weight:800; margin:8px 0; line-height:1.2; }
.quiz-question .qq-phonetic { color:#999; font-size:0.9em; font-family:"Lucida Sans Unicode",sans-serif; }
.quiz-question .qq-hint { color:#8b6fc0; font-size:0.85em; font-style:italic; margin-top:4px; }
.quiz-question .qq-listen-btn { background:none; border:2px solid #764ba2; border-radius:50%; width:56px; height:56px; font-size:1.8em; cursor:pointer; display:flex; align-items:center; justify-content:center; margin:8px auto; transition:all 0.15s; }
.quiz-question .qq-listen-btn:active { transform:scale(0.9); }
.quiz-question .qq-listen-btn.playing { background:#c8a8ff; }

/* 四选一选项 */
.quiz-options { display:flex; flex-direction:column; gap:10px; margin-top:14px; }
.quiz-opt { padding:14px 16px; border:2px solid #e0d0ff; border-radius:14px; background:rgba(255,255,255,0.9); font-size:0.95em; cursor:pointer; transition:all 0.2s; line-height:1.4; box-shadow:0 2px 6px rgba(118,75,162,0.04); }
.quiz-opt:hover { border-color:#764ba2; background:#f8f0ff; transform:translateX(4px); }
.quiz-opt:active { transform:scale(0.98); }
.quiz-opt.correct { border-color:#27ae60; background:#eafaf1; color:#1e8449; font-weight:700; }
.quiz-opt.wrong { border-color:#e74c3c; background:#fdecea; color:#c0392b; }
.quiz-opt.disabled { pointer-events:none; opacity:0.6; }
.quiz-opt.show-correct { border-color:#27ae60; background:#eafaf1; color:#1e8449; font-weight:700; opacity:1 !important; }


/* 拼写输入 */
.quiz-spell-input { width:100%; padding:14px 16px; border:2px solid #ddd; border-radius:14px; font-size:1.2em; outline:none; text-align:center; transition:border-color 0.2s; font-weight:700; letter-spacing:2px; }
.quiz-spell-input:focus { border-color:#764ba2; }
.quiz-spell-input.correct { border-color:#27ae60; background:#eafaf1; color:#1e8449; }
.quiz-spell-input.wrong { border-color:#e74c3c; background:#fdecea; color:#c0392b; }
.quiz-spell-hint { text-align:center; margin-top:8px; font-size:0.85em; min-height:24px; }
.quiz-spell-hint.correct { color:#27ae60; font-weight:700; }
.quiz-spell-hint.wrong { color:#e74c3c; }

/* 下一题按钮 */
.quiz-next-btn { width:100%; padding:12px; border:none; border-radius:12px; background:#764ba2; color:#fff; font-size:1em; font-weight:700; cursor:pointer; margin-top:12px; transition:all 0.15s; }
.quiz-next-btn:active { transform:scale(0.98); opacity:0.9; }

/* Quiz 结果页 */
.quiz-result { text-align:center; padding:30px 16px; }
.quiz-result .qr-score { font-size:3.5em; font-weight:800; background:linear-gradient(135deg,#667eea,#9b6dd7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:scorePop 0.6s cubic-bezier(0.34,1.56,0.64,1); }
.quiz-result .qr-label { font-size:1.1em; color:#555; margin-bottom:20px; }
.quiz-result .qr-msg { font-size:1.2em; margin:16px 0; padding:16px; background:#fff; border-radius:14px; border:2px solid #e8daff; }
.quiz-wrong-list { margin-top:20px; text-align:left; }
.quiz-wrong-list h3 { font-size:1em; color:#e74c3c; margin-bottom:10px; }
.quiz-wrong-item { background:#fff; border-radius:12px; padding:12px 14px; margin-bottom:8px; border-left:4px solid #e74c3c; }
.quiz-wrong-item .qwi-word { font-weight:700; color:#16213e; font-size:1em; }
.quiz-wrong-item .qwi-meaning { color:#555; font-size:0.88em; margin-top:3px; }
.quiz-wrong-item .qwi-yours { color:#e74c3c; font-size:0.82em; margin-top:2px; }
.quiz-result-btns { display:flex; gap:10px; margin-top:20px; }
.quiz-result-btns button { flex:1; padding:12px; border:none; border-radius:12px; font-size:0.95em; font-weight:700; cursor:pointer; }
.quiz-retry-btn { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; }
.quiz-back-btn { background:#fff; color:#764ba2; border:2px solid #764ba2 !important; }

@media (max-width:768px) {
  .quiz-modes { grid-template-columns:1fr 1fr; gap:8px; }
  .quiz-mode-card { padding:14px 10px; }
  .quiz-mode-card .qmc-icon { font-size:1.6em; }
  .quiz-question .qq-word { font-size:1.5em; }
}

/* 回到顶端 */
.back-top { position:fixed; right:16px; bottom:24px; width:52px; height:52px; border-radius:50%; border:none; background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; font-size:1.4em; cursor:pointer; box-shadow:0 4px 18px rgba(118,75,162,0.4); opacity:0; pointer-events:none; transition:all 0.3s; z-index:10001; display:flex; align-items:center; justify-content:center; touch-action:manipulation; }
.back-top.visible { opacity:1; pointer-events:auto; }
.back-top:hover { transform:translateY(-2px); box-shadow:0 6px 22px rgba(118,75,162,0.5); }
.back-top:active { transform:scale(0.9); }

.no-results { text-align:center; color:#ccc; padding:40px 0; font-size:1em; }
.footer { text-align:center; color:#b0a0c0; font-size:0.72em; padding:20px 0 28px; line-height:1.6; max-width:600px; margin:0 auto; }

.quiz-back-arrow {
  position: absolute; top: 10px; left: 10px;
  font-size: 1.4em; cursor: pointer; background: none; border: none;
  color: #666; padding: 4px 10px; border-radius: 8px;
}
.quiz-back-arrow:hover { background: #f0f0f0; color: #333; }

<script>

/* 例句发音 */
function speakExample(text, btn) {
  if (!text || !text.trim()) return;
  const synth = window.speechSynthesis;
  if (!synth) return;
  synth.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  utter.pitch = 1.0;
  // Try to pick a natural English voice
  const voices = synth.getVoices();
  const preferred = voices.find(v => v.lang === 'en-US' && v.name.includes('Natural')) ||
    voices.find(v => v.lang === 'en-US' && v.name.includes('Enhanced')) ||
    voices.find(v => v.lang === 'en-US' && !v.localService) ||
    voices.find(v => v.lang === 'en-US') ||
    voices.find(v => v.lang.startsWith('en'));
  if (preferred) utter.voice = preferred;
  if (btn) {
    btn.classList.add('playing');
    utter.onend = () => btn.classList.remove('playing');
    utter.onerror = () => btn.classList.remove('playing');
  }
  synth.speak(utter);
}

/* Add example speak buttons after rendering */
function addExampleSpeakButtons() {
  document.querySelectorAll('.example:not([data-speak]), .card-example:not([data-speak])').forEach(function(el) {
    el.setAttribute('data-speak', '1');
    // Get text content excluding button text
    const text = Array.from(el.childNodes)
      .filter(n => n.nodeType === 3) // text nodes only
      .map(n => n.textContent.trim())
      .join(' ')
      .trim();
    if (!text) return;
    const btn = document.createElement('button');
    btn.className = el.classList.contains('card-example') ? 'card-ex-speak' : 'ex-speak-btn';
    btn.textContent = '\u{1F50A}';
    btn.title = '朗读例句';
    btn.onclick = function() { speakExample(text, btn); };
    const toggleBtn = el.querySelector('.toggle-zh-btn, .card-toggle-zh');
    if (toggleBtn) {
      el.insertBefore(btn, toggleBtn);
    } else {
      el.appendChild(btn);
    }
  });
}

/* ===== 音频引擎（Web Audio API + 缓存池 + TTS 兜底）===== */
const CACHE_NAME = 'vocab-v62';
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const bufferCache = {};   // wordKey → AudioBuffer
const loadingSet = new Set(); // 正在加载的
let currentSource = null;     // 当前播放的 BufferSource
let currentBtn = null;        // 当前播放的按钮
let currentKey = null;        // 当前播放的word key
let currentTTS = false;       // 当前是否在播TTS
let unlocked = false;

// iOS: 首次触摸解锁 AudioContext
function unlockAudio() {
  if (unlocked) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  unlocked = true;
  preloadAll();
}
document.addEventListener('touchstart', unlockAudio, { once:true });
document.addEventListener('click', unlockAudio, { once:true });

// 异步加载音频到 AudioBuffer
async function loadBuffer(key) {
  if (bufferCache[key]) return bufferCache[key];
  if (loadingSet.has(key)) return null;
  loadingSet.add(key);
  try {
    const resp = await fetch('vocab-audio/' + key + '.mp3');
    if (!resp.ok) { bufferCache[key] = null; return null; }
    const arrayBuf = await resp.arrayBuffer();
    const audioBuf = await audioCtx.decodeAudioData(arrayBuf);
    bufferCache[key] = audioBuf;
    return audioBuf;
  } catch(e) {
    bufferCache[key] = null;
    return null;
  } finally {
    loadingSet.delete(key);
  }
}

// 全量预加载
function preloadAll() {
  const keys = [];
  VOCAB_DATA.forEach(sec => sec.words.forEach(w => {
    if (w.noAudio) return; // TTS词不预加载
    const k = w.en.toLowerCase().replace(/\s+/g, '_');
    if (!bufferCache.hasOwnProperty(k) && !loadingSet.has(k)) keys.push(k);
  }));
  keys.reduce((p, k) => p.then(() => loadBuffer(k)), Promise.resolve());
}

// TTS 播放（浏览器语音合成）
function speakTTS(word, btn) {
  if (!('speechSynthesis' in window)) return false;
  const key = word.toLowerCase().replace(/\s+/g, '_');

  if (currentKey === key && currentTTS) {
    speechSynthesis.cancel();
    stopCurrent();
    return true;
  }
  stopCurrent();

  const utt = new SpeechSynthesisUtterance(word);
  utt.lang = 'en-US';
  utt.rate = 0.85;
  // 优先选美式英语声音
  const voices = speechSynthesis.getVoices();
  const usVoice = voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en'));
  if (usVoice) utt.voice = usVoice;

  currentKey = key;
  currentBtn = btn;
  currentTTS = true;
  btn.classList.add('playing');

  utt.onend = () => {
    if (currentKey === key) {
      btn.classList.remove('playing');
      currentKey = null;
      currentBtn = null;
      currentTTS = false;
    }
  };
  utt.onerror = () => {
    btn.classList.remove('playing');
    btn.classList.add('error');
    setTimeout(() => btn.classList.remove('error'), 600);
    currentKey = null;
    currentBtn = null;
    currentTTS = false;
  };
  speechSynthesis.speak(utt);
  return true;
}

// 核心：播放/停止（优先真人音频 → TTS兜底）
async function speak(word, btn) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const key = word.toLowerCase().replace(/\s+/g, '_');

  // 如果点的是正在播放的按钮 → 停止
  if (currentKey === key && (currentSource || currentTTS)) {
    if (currentTTS) speechSynthesis.cancel();
    stopCurrent();
    return;
  }
  stopCurrent();

  // 查找该词条
  const entry = getMergedData().flatMap(s => s.words).find(w => w.en.toLowerCase().replace(/\s+/g,'_') === key);

  // noAudio 标记 → 直接用 TTS
  if (entry && entry.customAudioUrl) {
    // Real human audio from Free Dictionary API CDN
    btn.classList.add('loading');
    try {
      const resp = await fetch(entry.customAudioUrl);
      if (resp.ok) {
        const arrayBuf = await resp.arrayBuffer();
        const audioBuf = await audioCtx.decodeAudioData(arrayBuf);
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuf;
        source.connect(audioCtx.destination);
        source.onended = () => {
          if (currentKey === key) {
            btn.classList.remove('playing');
            currentSource = null;
            currentBtn = null;
            currentKey = null;
          }
        };
        source.start(0);
        currentSource = source;
        currentBtn = btn;
        currentKey = key;
        btn.classList.add('playing');
        btn.classList.remove('loading');
        return;
      }
    } catch(e) { /* fall through to TTS */ }
    btn.classList.remove('loading');
  }
  if (entry && entry.noAudio) {
    speakTTS(word, btn);
    return;
  }

  // 尝试真人音频
  btn.classList.add('loading');
  const buf = await loadBuffer(key);
  btn.classList.remove('loading');

  if (buf) {
    const source = audioCtx.createBufferSource();
    source.buffer = buf;
    source.connect(audioCtx.destination);
    source.onended = () => {
      if (currentKey === key) {
        btn.classList.remove('playing');
        currentSource = null;
        currentBtn = null;
        currentKey = null;
      }
    };
    source.start(0);
    currentSource = source;
    currentBtn = btn;
    currentKey = key;
    btn.classList.add('playing');
  } else {
    // 真人音频不存在 → TTS 兜底
    if (!speakTTS(word, btn)) {
      btn.classList.add('error');
      setTimeout(() => btn.classList.remove('error'), 600);
    }
  }
}

// 变形词发音（优先真人音频，TTS兜底）
async function speakIrr(word, btn) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const key = word.toLowerCase().replace(/\s+/g, '_');
  if (currentKey === key && (currentSource || currentTTS)) {
    if (currentTTS) speechSynthesis.cancel();
    stopCurrent();
    return;
  }
  stopCurrent();
  btn.classList.add('loading');
  const buf = await loadBuffer(key);
  btn.classList.remove('loading');
  if (buf) {
    const source = audioCtx.createBufferSource();
    source.buffer = buf;
    source.connect(audioCtx.destination);
    source.onended = () => {
      if (currentKey === key) { btn.classList.remove('playing'); currentSource = null; currentBtn = null; currentKey = null; }
    };
    source.start(0);
    currentSource = source;
    currentBtn = btn;
    currentKey = key;
    btn.classList.add('playing');
  } else {
    if (!speakTTS(word, btn)) {
      btn.classList.add('error');
      setTimeout(() => btn.classList.remove('error'), 600);
    }
  }
}

function stopCurrent() {
  if (currentSource) {
    try { currentSource.stop(); } catch(e) {}
    currentSource = null;
  }
  if (currentTTS) {
    speechSynthesis.cancel();
    currentTTS = false;
  }
  if (currentBtn) currentBtn.classList.remove('playing');
  currentBtn = null;
  currentKey = null;
}

/* ===== 词性排序 ===== */

/* ===== 例句中英切换 ===== */
function toggleZh(id, btn) {
  const enEl = document.getElementById(id + '-en');
  const zhEl = document.getElementById(id + '-zh');
  if (!enEl || !zhEl) return;
  const showingEn = enEl.style.display !== 'none';
  if (showingEn) {
    enEl.style.display = 'none';
    zhEl.style.display = '';
  } else {
    enEl.style.display = '';
    zhEl.style.display = 'none';
  }
}

function posPriority(pos) {
  const p = (pos||'').toLowerCase().trim();
  if (p.startsWith('n')) return 1;
  if (p.startsWith('v') || p.startsWith('modal')) return 2;
  if (p.startsWith('adj')) return 3;
  if (p.startsWith('adv') || p.startsWith('prep')) return 4;
  if (p === 'phrase') return 5;
  return 6;
}
function sortByPos(words) { return [...words].sort((a,b) => posPriority(a.pos)-posPriority(b.pos)); }

/* ===== 渲染 ===== */
const isMobile = () => window.innerWidth <= 768;

/* 格式化不规则动词标签 */
function formatIrrTag(irr) {
  if (!irr) return '';
  const irrBtn = word => `<button class="irr-speak-btn" onclick="speakIrr('${word}',this)" title="播放 ${word}">🔊</button>`;
  if (irr.includes('|')) {
    const parts = irr.split('|');
    const pastRaw = parts[0].replace('过去:', '');
    const ppRaw = parts[1].replace('过分:', '');
    const splitWP = s => { const m = s.match(/^(.+?)(\s+\/.+\/)$/); return m ? {w:m[1], p:m[2]} : {w:s, p:''}; };
    const past = splitWP(pastRaw);
    const pp = splitWP(ppRaw);
    const ph = s => s.p ? `<span class="irr-phonetic">${s.p}</span>` : '';
    return `<span class="irr-badge"><span class="irr-label">过去式</span><span class="irr-forms">${past.w}${ph(past)}</span>${irrBtn(past.w)}</span> <span class="irr-badge"><span class="irr-label">过去分词</span><span class="irr-forms">${pp.w}${ph(pp)}</span>${irrBtn(pp.w)}</span>`;
  }
  // might: "may的过去式"
  const mayMatch = irr.match(/^(.+)的过去式$/);
  if (mayMatch) return `<span class="irr-badge"><span class="irr-label">⚡</span><span class="irr-forms">${irr}</span>${irrBtn(mayMatch[1])}</span>`;
  return `<span class="irr-badge"><span class="irr-label">⚡</span><span class="irr-forms">${irr}</span>${irrBtn(irr.split('/')[0].trim())}</span>`;
}

function renderAll(filter) {
  const q = (filter||'').toLowerCase();
  const c = document.getElementById('content');
  c.innerHTML = '';
  let total = 0, shown = 0;
  const mobile = isMobile();

  getMergedData().filter(sec => !sec.isNouns500).forEach((sec, secIdx) => {
    let m = sec.words.filter(w =>
      !q || w.en.toLowerCase().includes(q) || w.meaning.includes(q) || w.example.toLowerCase().includes(q)
    );
    if (!m.length) return;
    m = sortByPos(m);
    total += sec.words.length;
    shown += m.length;

    const d = document.createElement('div');
    d.className = 'date-section';
    if (sec.isNouns500) d.classList.add('nouns500-section');
    d.id = 'section-' + secIdx;
    d.innerHTML = `<div class="date-header ${sec.isNouns500?'nouns500-header':''}">${sec.date} <span class="dh-count">${m.length}/${sec.words.length} 词</span></div>`;

    // Sub-category navigation for nouns500
    if (sec.isNouns500 && sec.categories) {
      const nav = document.createElement('div');
      nav.className = 'subcat-nav';
      sec.categories.forEach((cat, ci) => {
        const btn = document.createElement('button');
        btn.className = 'subcat-btn';
        btn.textContent = cat.nameZh;
        btn.onclick = () => {
          const target = document.getElementById('subcat-' + secIdx + '-' + ci);
          if (target) target.scrollIntoView({ behavior:'smooth', block:'start' });
          nav.querySelectorAll('.subcat-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        };
        nav.appendChild(btn);
      });
      d.appendChild(nav);

      // Render words grouped by sub-category
      const catGroups = {};
      m.forEach(w => {
        const key = w.subcategory || 'other';
        if (!catGroups[key]) catGroups[key] = [];
        catGroups[key].push(w);
      });

      sec.categories.forEach((cat, ci) => {
        const catWords = catGroups[cat.name] || [];
        if (!catWords.length) return;

        const header = document.createElement('div');
        header.className = 'subcat-header';
        header.id = 'subcat-' + secIdx + '-' + ci;
        header.innerHTML = cat.nameZh + ' <span class="sc-count">(' + cat.name + ') ' + catWords.length + '词</span>';
        d.appendChild(header);

        if (mobile) {
          const cards = document.createElement('div');
          cards.className = 'mobile-cards';
          catWords.forEach((w, i) => {
            const esc = w.en.replace(/'/g,"\\'");
            const card = document.createElement('div');
            card.className = 'vocab-card';
            const audioBtn = w.noAudio && !w.customAudioUrl ? `<button class="card-speak" data-word="${w.en}" onclick="speak('${esc}',this)">🤖</button>` : `<button class="card-speak" data-word="${w.en}" onclick="speak('${esc}',this)">🔊</button>`;
            const compoundTag = w.compound ? '<span class="compound-tag">🔗</span>' : '';
            const ttsTag = w.noAudio && !w.customAudioUrl ? '<span class="tts-mark">TTS</span>' : '';
            const rootHtml = w.root ? `<div class="card-root">${w.root}</div>` : '';
            const irrHtml = w.irr ? `<div class="card-irr">${formatIrrTag(w.irr)}</div>` : '';
            const zhId = `zh-${secIdx}-${ci}-${i}-${w.en.replace(/\s+/g,'-')}`;
            card.innerHTML = `
              <div class="card-top">
                <span class="card-num">${i+1}</span>
                ${audioBtn}
                <span class="card-word">${w.en}</span>${compoundTag}${ttsTag}
                <span class="card-phonetic">${w.phonetic}</span>
              </div>
              <span class="card-pos">${w.pos}</span>
              ${irrHtml}
              <div class="card-meaning">${w.meaning}</div>
              ${rootHtml}
              <div class="card-example" id="${zhId}-en">${w.example}<button class="card-toggle-zh" onclick="toggleZh('${zhId}',this)">中</button></div>
              <div class="card-example-zh" id="${zhId}-zh" style="display:none">${w.exampleZh||''}<button class="card-toggle-zh zh-mode" onclick="toggleZh('${zhId}',this)">英</button></div>`;
            cards.appendChild(card);
          });
          d.appendChild(cards);
        } else {
          const rows = catWords.map((w, i) => {
            const esc = w.en.replace(/'/g,"\\'");
            const audioBtn = w.noAudio && !w.customAudioUrl ? `<button class="speak-btn" data-word="${w.en}" onclick="speak('${esc}',this)">🤖</button>` : `<button class="speak-btn" data-word="${w.en}" onclick="speak('${esc}',this)">🔊</button>`;
            const compoundTag = w.compound ? '<span class="compound-tag">🔗</span>' : '';
            const ttsTag = w.noAudio && !w.customAudioUrl ? '<span class="tts-mark">TTS</span>' : '';
            const rootHtml = w.root ? `<div class="root-meaning">${w.root}</div>` : '';
            const irrHtml = w.irr ? `<div class="irr-row">${formatIrrTag(w.irr)}</div>` : '';
            const zhId = `zh-${secIdx}-${ci}-${i}-${w.en.replace(/\s+/g,'-')}`;
            return `<tr>
              <td class="td-num">${i+1}</td>

/* ===== 测验音效（Web Audio API 合成）===== */
function playCorrectSound() {
  try {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const now = audioCtx.currentTime;
    // 上行三音和弦 C5→E5→G5
    [523.25, 659.25, 783.99].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.15, now + i * 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.3);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now + i * 0.08);
      osc.stop(now + i * 0.08 + 0.35);
    });
  } catch(e) {}
}

function playWrongSound() {
  try {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(220, now);
    osc.frequency.linearRampToValueAtTime(180, now + 0.25);
    gain.gain.setValueAtTime(0.12, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.35);
  } catch(e) {}
}

/* ===== 错题记录本（localStorage 持久化）===== */
const MISTAKE_KEY = 'vocab_mistakes_v1';

function loadMistakes() {
  try {
    return JSON.parse(localStorage.getItem(MISTAKE_KEY)) || {};
  } catch(e) { return {}; }
}

function saveMistakes(data) {
  try { localStorage.setItem(MISTAKE_KEY, JSON.stringify(data)); } catch(e) {}
}

// 记录一次错误
function recordMistake(wordEn) {
  const data = loadMistakes();
  if (!data[wordEn]) data[wordEn] = { count: 0, firstAt: Date.now(), lastAt: Date.now(), correctAfterWrong: 0 };
  data[wordEn].count++;
  data[wordEn].lastAt = Date.now();
  data[wordEn].correctAfterWrong = 0; // 重置连续正确计数
  saveMistakes(data);
}

// 记录一次正确（连续正确计数，用于判断是否"已掌握"）
function recordCorrect(wordEn) {
  const data = loadMistakes();
  if (data[wordEn]) {
    data[wordEn].correctAfterWrong = (data[wordEn].correctAfterWrong || 0) + 1;
    data[wordEn].lastCorrectAt = Date.now();
    saveMistakes(data);
  }
}

// 艾宾浩斯遗忘曲线分析：返回需要复习的词，按紧急程度排序
function analyzeMistakes() {
  const data = loadMistakes();
  const allWords = getAllWords();
  const now = Date.now();
  const results = [];

  Object.keys(data).forEach(en => {
    const m = data[en];
    const word = allWords.find(w => w.en === en);
    if (!word) return;

    // 遗忘曲线复习间隔（小时）：1h, 8h, 1d, 2d, 4d, 7d, 15d, 30d
    const intervals = [1, 8, 24, 48, 96, 168, 360, 720];
    const stage = Math.min(m.correctAfterWrong || 0, intervals.length - 1);
    const reviewInterval = intervals[stage] * 3600000; // 转毫秒

    const timeSinceLastCorrect = m.lastCorrectAt ? (now - m.lastCorrectAt) : (now - m.firstAt);
    const timeSinceLastMistake = now - m.lastAt;
    const overdue = timeSinceLastMistake > reviewInterval;

    // 熟练度评分 0-100（越高越熟练）
    let mastery = 0;
    if (m.count === 0) { mastery = 100; }
    else {
      // 基础分：错误越多分越低
      const errorPenalty = Math.min(m.count * 15, 60);
      // 连续正确加分
      const streakBonus = Math.min((m.correctAfterWrong || 0) * 12, 36);
      // 时间衰减：上次错误越久，稍微恢复
      const hoursSince = timeSinceLastMistake / 3600000;
      const decayRecovery = Math.min(hoursSince * 0.3, 10);
      mastery = Math.max(0, Math.min(100, 100 - errorPenalty + streakBonus + decayRecovery));
    }

    // 紧急度：需要复习的程度（0-100）
    let urgency = 0;
    if (m.count > 0) {
      if (overdue || !m.lastCorrectAt) {
        urgency = Math.min(100, 40 + m.count * 10 + (overdue ? 30 : 0));
      } else {
        const progressRatio = timeSinceLastCorrect / reviewInterval;
        urgency = Math.min(100, progressRatio * 60 + m.count * 5);
      }
    }

    results.push({
      word,
      mistakes: m,
      mastery: Math.round(mastery),
      urgency: Math.round(urgency),
      stage,
      overdue,
      reviewDue: m.lastCorrectAt ? new Date(m.lastCorrectAt + reviewInterval) : null,
    });
  });

  // 按紧急度降序排列
  results.sort((a, b) => b.urgency - a.urgency);
  return results;
}

function getAllWords() {
  return getMergedData().flatMap(s => s.words);
}

function getWordsByRange(range) {
  if (range === 'all') return getAllWords();
  const sec = getMergedData().find(s => s.date === range);
  if (!sec) return getAllWords();
  // Support nouns500 sub-group filtering
  if (sec.isNouns500 && quizState.nounsGroup) {
    const g = NOUNS500_QUIZ_GROUPS.find(g => g.name === quizState.nounsGroup);
    if (g) return sec.words.filter(w => g.subcats.includes(w.subcategory));
  }
  return sec.words;
}

// 洗牌
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

// 从 allWords 中取 n 个不同于 correctWord 的干扰项
function pickDistractors(allWords, correctWord, n) {
  const pool = allWords.filter(w => w.en !== correctWord.en);
  return shuffle(pool).slice(0, n);
}


// 从含义中移除单词本身（防泄露）
function cleanMeaningForQuiz(meaning, wordEn) {
  let clean = meaning;
  const parts = wordEn.toLowerCase().split(/\s+/);
  parts.forEach(p => {
    if (p.length <= 2) return;
    // Use indexOf for simple substring replacement (no regex escaping issues)
    const lower = clean.toLowerCase();
    let idx = lower.indexOf(p);
    while (idx >= 0) {
      // Check word boundaries
      const beforeOk = idx === 0 || /[^a-zA-Z]/.test(clean[idx - 1]);
      const afterIdx = idx + p.length;
      const afterOk = afterIdx >= clean.length || /[^a-zA-Z]/.test(clean[afterIdx]);
      if (beforeOk && afterOk) {
        clean = clean.substring(0, idx) + '____' + clean.substring(afterIdx);
      }
      idx = lower.indexOf(p, idx + 1);
    }
  });
  return clean;
}

// 生成题目
function generateQuestions(mode, words, count) {
  const all = getAllWords();
  const picked = shuffle(words).slice(0, Math.min(count, words.length));
  return picked.map(w => {
    const q = { word: w, mode };
    if (mode === 'spell') return q; // 拼写模式不需要选项
    if (mode === 'listenSpell') {
      // 听声默写：不需要预设选项（先拼写，再选含义）
      // 含义选项：5选1
      const meaningDistractors = pickDistractors(all, w, 4);
      q.meaningOptions = shuffle([w, ...meaningDistractors].map(x => ({
        display: cleanMeaningForQuiz(x.meaning.replace(/[❶❷❸❹❺]/g, '').trim(), x.en),
        key: x.en
      })));
      return q;
    }
    const distractors = pickDistractors(all, w, 3);
    let options;
    if (mode === 'en2zh') {
      options = shuffle([w, ...distractors].map(x => ({ display: cleanMeaningForQuiz(x.meaning.replace(/[❶❷❸❹❺]/g, '').trim(), x.en), key: x.en })));
    } else if (mode === 'zh2en') {
      options = shuffle([w, ...distractors].map(x => ({ display: x.en, key: x.en })));
    } else if (mode === 'listen') {
      options = shuffle([w, ...distractors].map(x => ({ display: x.en, key: x.en })));
    } else if (mode === 'root') {
      // 词根模式：干扰项也需要有root
      const rootPool = all.filter(x => x.root && x.en !== w.en);
      const rootDist = shuffle(rootPool).slice(0, 3);
      const fill = rootDist.length < 3 ? [...distractors.slice(0, 3-rootDist.length)] : [];
      options = shuffle([w, ...rootDist, ...fill].slice(0,4).map(x => ({ display: x.en, key: x.en })));
    }
    // 检查词根提示是否泄露答案：提示中包含单词本身的就不适合出题
    const firstArrow = w.root.indexOf('\u2192');
    const rootHint = firstArrow > 0 ? w.root.substring(0, firstArrow).trimEnd() : w.root;
    const wordParts = w.en.toLowerCase().split(/\s+/).filter(sw => sw.length > 2);
    const rootLeaks = wordParts.some(sw => rootHint.toLowerCase().includes(sw));
    if (rootLeaks && mode === 'root') { q._rootLeaks = true; }
    q.options = options;
    return q;
  });
}

    nounsSubHtml += '<div class="nouns500-header" onclick="toggleNounsPanel()">📚 名词500 · 选择单元 <span class="nouns500-arrow">' + (isN500Active ? '▲' : '▼') + '</span></div>';

<button class="quiz-close-btn" onclick="closeQuiz()">✕</button>

function setNounsGroup(group, btn) {

  const maxQ = Math.min(total, 50);
  const slider = document.querySelector('.quiz-count-row input[type=range]');
  if (slider) { slider.max = maxQ; if (+slider.value > maxQ) slider.value = maxQ; quizState.count = +slider.value; slider.nextElementSibling.textContent = slider.value; }

function toggleNounsPanel() {
  var grid = document.querySelector('.nouns500-grid');
  var arrow = document.querySelector('.nouns500-arrow');
  var panel = document.querySelector('.nouns500-panel');
  if (!grid) return;
  var collapsed = grid.classList.contains('collapsed');
  grid.classList.toggle('collapsed');
  arrow.textContent = collapsed ? '▲' : '▼';
  panel.classList.toggle('active', collapsed);
}

function selectNounsGroup(group, btn) {
  quizState.nounsGroup = group;
  quizState.range = getMergedData().find(s => s.isNouns500).date;
  renderQuizSetup();
}
function setQuizRange(range, btn) {
  quizState.range = range;
  quizState.nounsGroup = null;
  renderQuizSetup();
}

function startQuiz() {
  if (quizState.mode === 'root') {
    // 词根模式：只用有root且词根提示不泄露答案的词
    const all = getAllWords();
    const rootWords = words.filter(w => {
      if (!w.root) return false;
      const firstArrow = w.root.indexOf('\u2192');
      const hint = firstArrow > 0 ? w.root.substring(0, firstArrow).trimEnd() : w.root;
      const wordParts = w.en.toLowerCase().split(/\s+/).filter(sw => sw.length > 2);
      return !wordParts.some(sw => hint.toLowerCase().includes(sw));
    });
    if (rootWords.length < 4) { alert('适合词根测验的词不足4个，请选择更多范围'); return; }
    quizState.questions = generateQuestions(quizState.mode, rootWords, quizState.count);
  } else {
    quizState.questions = generateQuestions(quizState.mode, words, quizState.count);
  }
  quizState.idx = 0;
  quizState.score = 0;
  quizState.wrong = [];
  quizState.answered = false;
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const { questions, idx, score } = quizState;
  const q = questions[idx];
  const total = questions.length;
  const progress = ((idx) / total * 100);
  const el = document.getElementById('quizInner');
  quizState.answered = false;

  let questionHTML = '';
  const w = q.word;

  if (q.mode === 'en2zh') {
    questionHTML = `
      <div class="qq-prompt">这个单词的含义是？</div>
      <div class="qq-word">${w.en}</div>
      ${w.pos ? `<div style="margin-top:4px"><span class="pos">${w.pos}</span></div>` : ''}
    `;
  } else if (q.mode === 'zh2en') {
    const cleanMeaning = w.meaning.replace(/[❶❷❸❹❺]/g, '').trim();
    questionHTML = `
      <div class="qq-prompt">哪个单词是这个含义？</div>
      <div class="qq-word" style="font-size:1.3em">${cleanMeaning}</div>
    `;
  } else if (q.mode === 'listen') {
    questionHTML = `
      <div class="qq-prompt">听发音，选出对应单词</div>
      <button class="qq-listen-btn" id="quizListenBtn" data-word="${w.en.replace(/"/g,'&quot;')}" onclick="quizPlayAudio(this.dataset.word,this)">🔊</button>
      <div class="qq-phonetic" style="visibility:hidden">${w.phonetic}</div>
    `;
  } else if (q.mode === 'root') {
    // 只取词根拆解部分（第一个→之前），避免推理过程和含义泄露答案
    const firstArrow = w.root.indexOf('\u2192');
    const rootHint = firstArrow > 0 ? w.root.substring(0, firstArrow).trimEnd() : w.root;
    questionHTML = `
      <div class="qq-prompt">根据词根拆解，这是哪个单词？</div>
      <div class="qq-hint" style="font-size:1.15em;color:#764ba2;font-style:normal;font-weight:700;margin:8px 0">${rootHint}</div>
    `;
  } else if (q.mode === 'spell') {
    const spellMeaning = cleanMeaningForQuiz(w.meaning, w.en);
    questionHTML = `
      <div class="qq-prompt">拼出这个单词</div>
      <div class="qq-word" style="font-size:1.2em">${spellMeaning}</div>
      ${w.pos ? `<div style="margin-top:4px"><span class="pos">${w.pos}</span></div>` : ''}
    `;
  } else if (q.mode === 'listenSpell') {
    questionHTML = `
      <div class="qq-prompt">🎧 听发音，拼出这个单词</div>
      <button class="qq-listen-btn" id="quizListenBtn" onclick="quizPlayAudio('${w.en.replace(/'/g,"\\\\'")}',this)">🔊</button>
      <div style="margin-top:10px">
        <input type="text" class="quiz-spell-input" id="quizSpellInput" placeholder="输入单词..." autocomplete="off" autocapitalize="off" spellcheck="false">
        <div class="quiz-spell-hint" id="quizSpellHint"></div>
      </div>
      <div id="listenSpellMeanings"></div>
    `;
  }

  let optionsHTML = '';
  if (q.mode === 'spell') {
    optionsHTML = `
      <div style="margin-top:14px">
        <input type="text" class="quiz-spell-input" id="quizSpellInput" placeholder="输入单词..." autocomplete="off" autocapitalize="off" spellcheck="false">
        <div class="quiz-spell-hint" id="quizSpellHint"></div>
        <button class="quiz-next-btn" onclick="checkSpell()">确认</button>
      </div>
    `;
  } else if (q.mode === 'listenSpell') {
    optionsHTML = '';
  } else {
    optionsHTML = `
      <div class="quiz-options">
        ${q.options.map((opt, i) => `
          <div class="quiz-opt" data-key="${opt.key}" onclick="selectOption(this)">${String.fromCharCode(65+i)}. ${opt.display}</div>
        `).join('')}
      </div>
    `;
  }

  el.innerHTML = `
    <div class="quiz-top">
      <h2>${QUIZ_MODES.find(m=>m.id===q.mode).icon} 第 ${idx+1}/${total} 题</h2>
      <button class="quiz-back-arrow" onclick="if(confirm('退出测验？当前进度将丢失')){renderQuizHome()}">←</button>
<button class="quiz-close-btn" onclick="closeQuiz()">✕</button>
    </div>
    <div class="quiz-progress">
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${progress}%"></div></div>
      <span class="quiz-progress-text">${idx+1}/${total}</span>
      <span class="quiz-score-live">✅ ${score}</span>
    </div>
    <div class="quiz-question">
      ${questionHTML}
      ${optionsHTML}
    </div>
    <button class="quiz-next-btn" id="quizNextBtn" style="display:none" onclick="nextQuestion()">下一题 →</button>
  `;

  // 拼写模式自动聚焦
  if (q.mode === 'spell') {
    setTimeout(() => {
      const input = document.getElementById('quizSpellInput');
      if (input) {
        input.focus();
        input.addEventListener('keydown', e => { if (e.key === 'Enter') { if (quizState.answered) { nextQuestion(); } else { checkSpell(); } } });
      }
    }, 100);
  }

  // 听声默写模式：自动播放+聚焦+回车
  if (q.mode === 'listenSpell') {
    setTimeout(() => {
      const input = document.getElementById('quizSpellInput');
      if (input) {
        input.focus();
        input.addEventListener('keydown', e => { if (e.key === 'Enter') { if (quizState.answered) { nextQuestion(); } else { checkListenSpell(); } } });
      }
      const btn = document.getElementById('quizListenBtn');
      if (btn) quizPlayAudio(w.en, btn);
    }, 300);
  }

  // 听音模式自动播放
  if (q.mode === 'listen') {
    setTimeout(() => {
      const btn = document.getElementById('quizListenBtn');
      if (btn) quizPlayAudio(w.en, btn);
    }, 300);
  }
}

function quizPlayAudio(word, btn) {
  if (btn) btn.classList.add('playing');
  speak(word, {
    classList: {
      add: c => { if (btn) btn.classList.add(c); },
      remove: c => { if (btn) btn.classList.remove(c); }
    }
  });
  setTimeout(() => { if (btn) btn.classList.remove('playing'); }, 1500);
}

function selectOption(el) {
  if (quizState.answered) return;
  quizState.answered = true;
  const q = quizState.questions[quizState.idx];
  const selected = el.dataset.key;
  const correct = q.word.en;

  // 标记所有选项
  document.querySelectorAll('.quiz-opt').forEach(opt => {
    if (opt.dataset.key === correct) { opt.classList.add('show-correct'); }
    else { opt.classList.add('disabled'); }
  });

  if (selected === correct) {
    el.classList.add('correct');
    quizState.score++;
    playCorrectSound();
  } else {
    el.classList.add('wrong');
    quizState.wrong.push({ word: q.word, yourAnswer: el.textContent.replace(/^[A-D]\.\s*/, '') });
    playWrongSound();
  }

  document.getElementById('quizNextBtn').style.display = '';
  // 更新实时分数
  document.querySelector('.quiz-score-live').textContent = `✅ ${quizState.score}`;
  // 记录答题结果到错题本
  if (selected === correct) { recordCorrect(q.word.en); } else { recordMistake(q.word.en); }
  // 不自动跳转，需手动点击
}

function checkSpell() {
  if (quizState.answered) return;
  const input = document.getElementById('quizSpellInput');
  const hint = document.getElementById('quizSpellHint');
  if (!input) return;
  const q = quizState.questions[quizState.idx];
  const answer = input.value.trim().toLowerCase();
  const correct = q.word.en.toLowerCase();

  quizState.answered = true;
  if (answer === correct) {
    input.classList.add('correct');
    hint.textContent = '✅ 正确！';
    hint.className = 'quiz-spell-hint correct';
    quizState.score++;
    playCorrectSound();
  } else {
    input.classList.add('wrong');
    const _sm = q.word.meaning || '';
    const _sp = q.word.pos ? `<span style="background:#e8daff;color:#764ba2;padding:2px 8px;border-radius:6px;font-size:0.7em;margin-right:6px">${q.word.pos}</span>` : '';
    hint.innerHTML = `❌ 正确答案: <strong>${q.word.en}</strong><div style="margin-top:6px;font-size:0.95em;color:#2c3e50">${_sp}${_sm}</div>`;
    hint.className = 'quiz-spell-hint wrong';
    quizState.wrong.push({ word: q.word, yourAnswer: input.value.trim() });
    playWrongSound();
  }
  document.getElementById('quizNextBtn').style.display = '';
  document.querySelector('.quiz-score-live').textContent = `✅ ${quizState.score}`;
  // 记录答题结果到错题本
  if (answer === correct) { recordCorrect(q.word.en); } else { recordMistake(q.word.en); }
  // 不自动跳转，需手动点击
}

// 听声默写：先拼写，再选含义
function checkListenSpell() {
  if (quizState.answered) return;
  const input = document.getElementById('quizSpellInput');
  if (!input) return;
  const q = quizState.questions[quizState.idx];
  const answer = input.value.trim().toLowerCase();
  const correct = q.word.en.toLowerCase();

  if (answer !== correct) {
    // 拼写错误：显示正确拼写，不出现含义选项，Enter直接下一题
    quizState.answered = true;
    input.classList.add('wrong');
    input.disabled = true;
    playWrongSound();
    quizState.wrong.push({ word: q.word, yourAnswer: '拼写错误: ' + input.value.trim() });
    recordMistake(q.word.en);

    // 显示正确拼写 + 中文释义
    const hint = document.getElementById('quizSpellHint');
    if (hint) {
      hint.innerHTML = '<div style="margin-top:12px;padding:12px;background:#fdecea;border-radius:10px;font-size:1.15em"><span style="color:#e74c3c">✗ ' + input.value.trim() + '</span>  →  <span style="color:#27ae60;font-weight:700;font-size:1.3em">✓ ' + q.word.en + '</span></div>';
    }
    const meaningsEl = document.getElementById('listenSpellMeanings');
    if (meaningsEl) {
      const meaningText = q.word.meaning || '';
      const posTag = q.word.pos ? '<span style="background:#e8daff;color:#764ba2;padding:2px 8px;border-radius:6px;font-size:0.6em;margin-right:6px">' + q.word.pos + '</span>' : '';
      meaningsEl.innerHTML = '<div style="margin-top:10px;padding:14px;background:#eafaf1;border:2px solid #27ae60;border-radius:12px;text-align:center"><div style="font-size:1.4em;font-weight:700;color:#1e8449;letter-spacing:2px">' + q.word.en + '</div><div style="margin-top:8px;font-size:1em;color:#2c3e50">' + posTag + meaningText + '</div></div>';
    }
    document.getElementById('quizNextBtn').style.display = '';
    document.querySelector('.quiz-score-live').textContent = '✅ ' + quizState.score;
    return;
  }

  // 拼写正确，进入第二阶段：选含义
  input.classList.add('correct');
  input.disabled = true;
  playCorrectSound();

  showListenSpellMeaningOptions(q, false);
}

function showListenSpellMeaningOptions(q, alreadyWrong) {
  const w = q.word;
  const optionsHTML = q.meaningOptions.map((opt, i) => {
    const letter = String.fromCharCode(65 + i);
    return '<div class="quiz-opt" data-key="' + opt.key + '" onclick="selectListenSpellMeaning(this,' + (alreadyWrong ? 'true' : 'false') + ')">' + letter + '. ' + opt.display + '</div>';
  }).join('');

  const container = document.getElementById('listenSpellMeanings');
  if (container) {
    container.innerHTML = '<div class="qq-prompt" style="margin-top:14px;margin-bottom:8px">选择正确的含义：</div><div class="quiz-options">' + optionsHTML + '</div>';
  }
}

function selectListenSpellMeaning(el, alreadyWrong) {
  if (quizState.answered && !alreadyWrong) return;
  quizState.answered = true;
  const q = quizState.questions[quizState.idx];
  const selected = el.dataset.key;
  const correct = q.word.en;

  document.querySelectorAll('.quiz-opt').forEach(opt => {
    if (opt.dataset.key === correct) { opt.classList.add('show-correct'); }
    else { opt.classList.add('disabled'); }
  });

  if (selected === correct && !alreadyWrong) {
    el.classList.add('correct');
    quizState.score++;
    playCorrectSound();
    recordCorrect(q.word.en);
  } else {
    el.classList.add('wrong');
    if (!alreadyWrong) {
      quizState.wrong.push({ word: q.word, yourAnswer: '含义选错' });
      recordMistake(q.word.en);
    }
    playWrongSound();
  }

  document.getElementById('quizNextBtn').style.display = '';
  document.querySelector('.quiz-score-live').textContent = '✅ ' + quizState.score;
}

function nextQuestion() {
  if (quizState._autoNext) { clearTimeout(quizState._autoNext); quizState._autoNext = null; }
  quizState.idx++;
  if (quizState.idx >= quizState.questions.length) {
    renderQuizResult();
  } else {
    renderQuizQuestion();
  }
}

function renderQuizResult() {
  const { questions, score, wrong, mode } = quizState;
  const total = questions.length;
  const pct = Math.round(score / total * 100);
  const modeInfo = QUIZ_MODES.find(m => m.id === mode) || { icon:'📝', title:'测验' };

  let msg = '';
  if (pct === 100) msg = '🏆 完美！一个没错！';
  else if (pct >= 90) msg = '🌟 太棒了！几乎全对！';
  else if (pct >= 70) msg = '👍 不错，继续加油！';

  const el = document.getElementById('quizInner');

        <button class="quiz-back-btn" onclick="renderQuizHome()">🏠 返回</button>

// Check if word exists in VOCAB_DATA or my words
function findExistingWord(word) {
  const w = word.toLowerCase().trim();
  // Check VOCAB_DATA
  for (const sec of VOCAB_DATA) {
    for (const wd of sec.words) {
      if (wd.en.toLowerCase() === w) return { source: 'builtin', data: wd };
    }
  }
  // Check my words
  const myWords = getMyWords();
  const found = myWords.find(m => m.en.toLowerCase() === w);
  if (found) return { source: 'custom', data: found };
  return null;
}

let pendingWord = null;

async function fetchCambridgeZh(word) {
  // Cambridge bilingual dictionary (English-Chinese Simplified)
  // Uses allorigins.win/raw proxy (CORS *) to bypass Cloudflare
  try {
    const camUrl = 'https://dictionary.cambridge.org/dictionary/english-chinese-simplified/' + encodeURIComponent(word);
    const resp = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(camUrl));
    if (!resp.ok) return null;
    const htmlText = await resp.text();
    if (!htmlText || htmlText.length < 1000) return null;

    const result = { phonetic: '', posList: [], defs: [], usAudio: '' };

    // US phonetic (IPA)
    const usBlock = htmlText.match(/class="us dpron-i[\s\S]*?class="pron dpron">[\s\S]*?<\/span>/);
    if (usBlock) {
      const ipaMatch = usBlock[0].match(/class="ipa[^"]*">([\s\S]*?)<\/span>/);
      if (ipaMatch) {
        result.phonetic = '/' + ipaMatch[1].replace(/<[^>]+>/g, '').trim() + '/';
      }
    }

    // POS tags
    const posMatches = htmlText.match(/class="pos dpos"[^>]*>([^<]+)/g) || [];
    result.posList = [...new Set(posMatches.map(p => {
      const t = p.replace(/<[^>]+>/g, '').trim();
      if (t === 'noun') return 'n.';
      if (t === 'verb') return 'v.';
      if (t === 'adjective') return 'adj.';
      if (t === 'adverb') return 'adv.';
      if (t === 'preposition') return 'prep.';
      if (t === 'conjunction') return 'conj.';
      if (t === 'pronoun') return 'pron.';
      if (t === 'interjection' || t === 'exclamation') return 'interj.';
      return t.includes('.') ? t : t + '.';
    }))];

    // US audio URL
    const usAudioMatch = htmlText.match(/class="us[^"]*dpron-i[^"]*[\s\S]*?src="([^"]*us_pron[^"]*\.mp3)"/);
    if (usAudioMatch) {
      let url = usAudioMatch[1];
      if (!url.startsWith('http')) url = 'https://dictionary.cambridge.org' + url;
      result.usAudio = url;
    }

    // Definitions with Chinese translations
    const defBlocks = htmlText.match(/class="def-block ddef_block[\s\S]*?class="def-body ddef_b"[\s\S]*?<\/div>/g) || [];
    defBlocks.forEach((block) => {
      const transSpan = block.match(/class="trans dtrans dtrans-se[\s\S]*?<\/span>/);
      let zhText = '';
      if (transSpan) {
        const dtransAll = transSpan[0].match(/class="dtrans">([^<]+)/g) || [];
        zhText = dtransAll.map(d => d.replace(/class="[^"]*">/, '')).join('\uFF1B');
      }
      const enDef = block.match(/class="def ddef_d db[^"]*">([\s\S]*?)<\/span>/);
      const enText = enDef ? enDef[1].replace(/<[^>]+>/g, '').trim() : '';
      const exampEn = block.match(/class="eg deg[^"]*">([\s\S]*?)<\/span>/);
      const exampZh = block.match(/class="trans dtrans dtrans-se hdb[^"]*"[^>]*>([^<]+)/);

      if (zhText || enText) {
        result.defs.push({
          zh: zhText,
          en: enText,
          exampleEn: exampEn ? exampEn[1].replace(/<[^>]+>/g, '').trim() : '',
          exampleZh: exampZh ? exampZh[1].trim() : ''
        });
      }
    });

    result.defs = result.defs.filter(d => d.zh);
    return result;
  } catch(e) {
    console.warn('Cambridge fetch failed:', e);
    return null;
  }
}

async function fetchZhTranslation(text) {
  try {
    const resp = await fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=en|zh-CN');
    const data = await resp.json();
    if (data.responseData && data.responseData.translatedText) {
      let t = data.responseData.translatedText;
      if (t === t.toUpperCase() && t.length < 20) t = t.toLowerCase();
      return t;
    }
    return '';
  } catch(e) { return ''; }
}

async function fetchUSAudio(word) {
  // Get real human US pronunciation from Free Dictionary API
  try {
    const resp = await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(word));
    if (!resp.ok) return '';
    const data = await resp.json();
    if (!data || !data.length) return '';
    const phonetics = data[0]?.phonetics || [];
    // Prefer US audio
    const usAudio = phonetics.find(p => p.audio && p.audio.includes('-us'));
    if (usAudio) return usAudio.audio;
    // Fallback to any audio
    const anyAudio = phonetics.find(p => p.audio);
    return anyAudio?.audio || '';
  } catch(e) { return ''; }
}

async function searchAndAdd() {
  const input = document.getElementById('addWordInput');
  const word = input.value.trim().toLowerCase();
  if (!word) return;

  const status = document.getElementById('awStatus');
  const result = document.getElementById('awResult');
  const addBtn = document.getElementById('awAddBtn');
  const already = document.getElementById('awAlready');

  result.classList.remove('show');
  addBtn.classList.remove('show');
  already.classList.remove('show');
  pendingWord = null;

  const existing = findExistingWord(word);
  if (existing) {
    already.classList.add('show');
    status.textContent = '';
    status.className = 'aw-status';
    const d = existing.data;
    document.getElementById('awrWord').textContent = d.en;
    document.getElementById('awrPhonetic').textContent = d.phonetic || '';
    document.getElementById('awrPos').textContent = d.pos || '';
    document.getElementById('awrMeaning').textContent = d.meaning || '';
    document.getElementById('awrExample').textContent = d.example || '';
    result.classList.add('show');
    return;
  }

  const searchBtn = document.getElementById('addWordSearchBtn');
  searchBtn.disabled = true;
  status.textContent = '\u{1F50D} \u6B63\u5728\u67E5\u8BE2\u8BCD\u5178...';
  status.className = 'aw-status loading';

  try {
    // Step 1: Fetch from Free Dictionary API for English data
    const fdaResp = await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(word));
    if (!fdaResp.ok) {
      status.textContent = '\u274C \u672A\u627E\u5230 "' + word + '"\uFF0C\u8BF7\u68C0\u67E5\u62FC\u5199';
      status.className = 'aw-status error';
      return;
    }
    const fdaData = await fdaResp.json();
    if (!fdaData || !fdaData.length) {
      status.textContent = '\u274C \u672A\u627E\u5230 "' + word + '" \u7684\u8D44\u6599';
      status.className = 'aw-status error';
      return;
    }

    const entry = fdaData[0];
    const meanings = entry.meanings || [];

    // Step 2: Get US audio URL (real human pronunciation)
    status.textContent = '\u{1F3B5} \u6B63\u5728\u83B7\u53D6\u7CBE\u4EBA\u7F8E\u5F0F\u53D1\u97F3...';
    const audioUrl = await fetchUSAudio(word);

    // Step 3: Get Chinese definitions from Youdao
    status.textContent = '\u{1F4D6} \u6B63\u5728\u83B7\u53D6\u6709\u9053\u8BCD\u5178\u4E2D\u6587\u91CA\u4E49...';
    const cambridge = await fetchCambridgeZh(word);

    // Build word data
    let phonetic = '';
    let posList = [];
    let meaningZh = '';

    if (cambridge && cambridge.defs.length > 0) {
      // Use Cambridge bilingual dictionary data
      phonetic = cambridge.phonetic || '';
      posList = cambridge.posList || [];

      const circled = '\u2776\u2777\u2778\u2779\u277A\u277B\u277C\u277D\u277E\u277F';
      meaningZh = cambridge.defs.map((d, i) => i < 10 ? circled.charAt(i) + ' ' + d.zh : d.zh).join(' ');

      // Use Cambridge examples
      if (cambridge.defs.length > 0 && cambridge.defs[0].exampleEn) {
        example = cambridge.defs.map(d => d.exampleEn).filter(Boolean).join(' / ');
        exampleZh = cambridge.defs.map(d => d.exampleZh).filter(Boolean).join(' / ');
      }

      // Use Cambridge audio if available (direct from Cambridge CDN)
      // Cambridge CDN audio has no CORS, skip
      // audioUrl already from Free Dictionary API (has CORS *)
    } else {
      // Cambridge无结果，降级Free Dictionary API + MyMemory翻译
      let meaningEnParts = [];
      for (const m of meanings) {
        let pos = m.partOfSpeech || '';
        if (pos === 'noun') pos = 'n.';
        else if (pos === 'verb') pos = 'v.';
        else if (pos === 'adjective') pos = 'adj.';
        else if (pos === 'adverb') pos = 'adv.';
        else if (pos === 'preposition') pos = 'prep.';
        else if (pos === 'conjunction') pos = 'conj.';
        else if (pos === 'pronoun') pos = 'pron.';
        else if (pos === 'interjection' || pos === 'exclamation') pos = 'interj.';
        else if (pos && !pos.includes('.')) pos = pos + '.';
        posList.push(pos);

        for (const def of (m.definitions || [])) {
          meaningEnParts.push(def.definition);
          if (meaningEnParts.length >= 6) break;
        }
        if (meaningEnParts.length >= 6) break;
      }

      status.textContent = '\u{1F310} \u6B63\u5728\u7FFB\u8BD1\u4E2D\u6587\u91CA\u4E49...';
      const circled = '\u2776\u2777\u2778\u2779\u277A\u277B\u277C\u277D\u277E\u277F';
      const parts = [];
      for (let i = 0; i < meaningEnParts.length; i++) {
        const zh = await fetchZhTranslation(meaningEnParts[i]);
        parts.push(circled.charAt(i) + ' ' + (zh || meaningEnParts[i]));
        if (i < meaningEnParts.length - 1) await new Promise(r => setTimeout(r, 300));
      }
      meaningZh = parts.join(' ');

      if (!phonetic) {
        phonetic = entry.phonetic || '';
        if (!phonetic && entry.phonetics) {
          const ph = entry.phonetics.find(p => p.text);
          if (ph) phonetic = ph.text;
        }
        if (phonetic && !phonetic.startsWith('/')) phonetic = '/' + phonetic;
        if (phonetic && !phonetic.endsWith('/')) phonetic = phonetic + '/';
      }
    }

    // POS from Free Dictionary API (more accurate than Youdao for English)
    if (posList.length === 0) {
      for (const m of meanings) {
        let pos = m.partOfSpeech || '';
        if (pos === 'noun') pos = 'n.';
        else if (pos === 'verb') pos = 'v.';
        else if (pos === 'adjective') pos = 'adj.';
        else if (pos === 'adverb') pos = 'adv.';
        else if (pos === 'preposition') pos = 'prep.';
        else if (pos === 'conjunction') pos = 'conj.';
        else if (pos === 'pronoun') pos = 'pron.';
        else if (pos === 'interjection' || pos === 'exclamation') pos = 'interj.';
        else if (pos && !pos.includes('.')) pos = pos + '.';
        posList.push(pos);
      }
    }
    const posStr = [...new Set(posList)].join('/');

    // Examples: prefer Youdao bilingual examples
    let example = '';
    let exampleZh = '';
    if (youdao && youdao.examples.length > 0) {
      example = youdao.examples.map(e => e.en).join(' / ');
      exampleZh = youdao.examples.map(e => e.zh).join(' / ');
    } else {
      // Fallback: examples from Free Dictionary API + translate
      const allExamples = [];
      for (const m of meanings) {
        for (const def of (m.definitions || [])) {
          if (def.example) allExamples.push(def.example);
          if (allExamples.length >= 2) break;
        }
        if (allExamples.length >= 2) break;
      }
      example = allExamples.join(' / ');
      if (example) {
        exampleZh = await fetchZhTranslation(example);
      }
    }

    const hasRealAudio = audioUrl && audioUrl.length > 0;

    const wordData = {
      en: entry.word || word,
      phonetic: phonetic,
      pos: posStr || 'n.',
      meaning: meaningZh,
      example: example,
      exampleZh: exampleZh || '',
      root: '',
      noAudio: !hasRealAudio,
      customAudioUrl: hasRealAudio ? audioUrl : '',
      custom: true,
      addedAt: new Date().toISOString().slice(0,10)
    };

    pendingWord = wordData;

    const audioTag = hasRealAudio ? '\u{1F50A} \u7CBE\u4EBA\u7F8E\u5F0F' : '\u{1F916} TTS';
    document.getElementById('awrWord').textContent = wordData.en;
    document.getElementById('awrPhonetic').textContent = wordData.phonetic;
    document.getElementById('awrPos').textContent = wordData.pos;
    document.getElementById('awrMeaning').textContent = wordData.meaning;
    document.getElementById('awrExample').textContent = wordData.example;
    result.classList.add('show');
    addBtn.classList.add('show');
    status.textContent = '\u2705 \u67E5\u8BE2\u5B8C\u6210\uFF01' + audioTag + ' | \u70B9\u51FB\u6DFB\u52A0';
    status.className = 'aw-status success';

  } catch(e) {
    status.textContent = '\u274C \u7F51\u7EDC\u9519\u8BEF: ' + e.message;
    status.className = 'aw-status error';
  } finally {
    searchBtn.disabled = false;
  }
}

function confirmAddWord() {
  if (!pendingWord) return;
  const myWords = getMyWords();
  // Double check no duplicate
  if (myWords.find(w => w.en.toLowerCase() === pendingWord.en.toLowerCase())) {
    document.getElementById('awAlready').classList.add('show');
    return;
  }
  myWords.push(pendingWord);
  saveMyWords(myWords);
  pendingWord = null;

  const status = document.getElementById('awStatus');
  status.textContent = '✅ 已添加！';
  status.className = 'aw-status success';
  document.getElementById('awAddBtn').classList.remove('show');
  document.getElementById('awResult').classList.remove('show');
  document.getElementById('addWordInput').value = '';

  renderMyWordTags();
  renderAll(document.getElementById('searchInput').value); // Refresh main view
}

function removeMyWord(en) {
  let myWords = getMyWords();
  myWords = myWords.filter(w => w.en.toLowerCase() !== en.toLowerCase());
  saveMyWords(myWords);
  renderMyWordTags();
  renderAll(document.getElementById('searchInput').value);
}

function renderMyWordTags() {
  const myWords = getMyWords();
  document.getElementById('awMyCount').textContent = myWords.length;
  const list = document.getElementById('awMyList');
  list.innerHTML = myWords.map(w =>
    '<span class="aw-my-tag">' + w.en + ' <span class="aw-remove" onclick="removeMyWord(\'' + w.en.replace(/'/g, "\\'") + '\')">✕</span></span>'
  ).join('');
}

// Merge my words into VOCAB_DATA for rendering
function getMergedData() {
  const myWords = getMyWords();
  if (!myWords.length) return VOCAB_DATA;
  // Check if "my words" section already exists
  let merged = VOCAB_DATA.filter(s => !s.date.includes('📋 我添加的'));
  if (myWords.length > 0) {
    merged.push({ date: '📋 我添加的（' + myWords.length + '词）', words: myWords });
  }
  return merged;
}

function renderNouns500(filter) {
  const q = (filter || '').toLowerCase();
  const nv = document.getElementById('nounsView');
  const mobile = isMobile();
  const data = getMergedData();
  const sec = data.find(s => s.isNouns500);
  if (!sec) return;

  let words = sec.words.filter(w =>
    !q || w.en.toLowerCase().includes(q) || w.meaning.includes(q) || (w.example || '').toLowerCase().includes(q)
  );

  let html = '<div class="nouns-top"><h2>📚 高频名词500</h2><button class="nouns-close-btn" onclick="closeNouns500()">✕</button></div>';
  html += '<div class="nouns-stats" id="nounsStats"></div>';

  // Sub-category nav
  if (sec.categories) {
    html += '<div class="subcat-nav" id="subcatNav">';
    sec.categories.forEach((cat, ci) => {
      const count = words.filter(w => w.subcategory === cat.name).length;
      if (count > 0) {
        html += '<button class="subcat-btn" onclick="jumpSubcat(' + ci + ')">' + cat.nameZh + '</button>';
      }
    });
    html += '</div>';
  }

  // Group words by subcategory
  const catGroups = {};
  words.forEach(w => {
    const key = w.subcategory || 'other';
    if (!catGroups[key]) catGroups[key] = [];
    catGroups[key].push(w);
  });

  if (sec.categories) {
    sec.categories.forEach((cat, ci) => {
      const catWords = catGroups[cat.name] || [];
      if (!catWords.length) return;

      html += '<div class="subcat-header" id="subcat-' + ci + '">' + cat.nameZh + ' <span class="sc-count">(' + cat.name + ') ' + catWords.length + '词</span></div>';

      if (mobile) {
        html += '<div class="mobile-cards">';
        catWords.forEach((w, i) => {
          const esc = w.en.replace(/'/g, "\\'");

          const ttsTag = w.noAudio ? '<span class="tts-mark">TTS</span>' : '';
          const rootHtml = w.root ? '<div class="card-root">' + w.root + '</div>' : '';
          const zhId = 'nzh-' + ci + '-' + i + '-' + w.en.replace(/\s+/g, '-');
          const exHtml = w.example ? '<div class="card-example" id="' + zhId + '-en">' + w.example + '<button class="card-toggle-zh" onclick="toggleZh(\'' + zhId + '\',this)">中</button></div><div class="card-example-zh" id="' + zhId + '-zh" style="display:none">' + (w.exampleZh || '') + '<button class="card-toggle-zh zh-mode" onclick="toggleZh(\'' + zhId + '\',this)">英</button></div>' : '';

        });
        html += '</div>';
      } else {
        html += '<table class="desk-table"><thead><tr><th>#</th><th>🔊 单词</th><th>音标</th><th>词性</th><th>含义</th><th>例句</th></tr></thead><tbody>';
        catWords.forEach((w, i) => {
          const esc = w.en.replace(/'/g, "\\'");
          const audioBtn = w.noAudio ? '<button class="speak-btn" data-word="' + w.en + '" onclick="speak(\'' + esc + '\',this)">🤖</button>' : '<button class="speak-btn" data-word="' + w.en + '" onclick="speak(\'' + esc + '\',this)">🔊</button>';
          const compoundTag = w.compound ? '<span class="compound-tag">🔗</span>' : '';
          const ttsTag = w.noAudio ? '<span class="tts-mark">TTS</span>' : '';
          const rootHtml = w.root ? '<div class="root-meaning">' + w.root + '</div>' : '';
          const zhId = 'nzh-' + ci + '-' + i + '-' + w.en.replace(/\s+/g, '-');
          const exHtml = w.example ? '<div id="' + zhId + '-en" class="example">' + w.example + '<button class="toggle-zh-btn" onclick="toggleZh(\'' + zhId + '\',this)">中</button></div><div id="' + zhId + '-zh" class="example-zh" style="display:none">' + (w.exampleZh || '') + '<button class="toggle-zh-btn zh-mode" onclick="toggleZh(\'' + zhId + '\',this)">英</button></div>' : '';
          html += '<tr><td class="td-num">' + (i+1) + '</td><td><div class="word-cell">' + audioBtn + w.en + compoundTag + ttsTag + '</div></td><td class="phonetic">' + w.phonetic + '</td><td><span class="pos">' + w.pos + '</span></td><td class="meaning">' + w.meaning + rootHtml + '</td><td>' + exHtml + '</td></tr>';
        });
        html += '</tbody></table>';
      }
    });
  }

  nv.innerHTML = html;
  addExampleSpeakButtons();
  document.getElementById('nounsStats').textContent = q ? '共 ' + sec.words.length + ' 词，匹配 "' + filter + '" 显示 ' + words.length + ' 词' : '共 ' + sec.words.length + ' 词，' + (sec.categories ? sec.categories.length + ' 个分类' : '');
}

function jumpSubcat(ci) {
  const el = document.getElementById('subcat-' + ci);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    const nav = document.getElementById('subcatNav');
    if (nav) {
      nav.querySelectorAll('.subcat-btn').forEach(b => b.classList.remove('active'));
      const btns = nav.querySelectorAll('.subcat-btn');
      // Find the button that matches this category index
      let btnIdx = 0;
      const data = getMergedData();
      const sec = data.find(s => s.isNouns500);
      if (sec && sec.categories) {
        sec.categories.forEach((cat, idx) => {
          if (idx === ci) {
            if (btns[btnIdx]) btns[btnIdx].classList.add('active');
          }
          // Only count visible categories (those with words)
          const visibleWords = sec.words.filter(w => w.subcategory === cat.name);
          if (visibleWords.length > 0) btnIdx++;
        });
      }
    }
  }
}
