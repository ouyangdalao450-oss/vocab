  const container = document.getElementById('grammarInner');
  
  let html = '<div class="grammar-top"><h2>📝 语法记录</h2>';
  html += '<div style="display:flex;gap:8px;align-items:center">';
  html += '<button class="grammar-add-btn" onclick="openGrammarAdd()">➕ 添加</button>';
  html += '<button class="grammar-close-btn" onclick="closeGrammar()">✕</button>';
  html += '</div></div>';
  
  if (data.length === 0) {
    html += '<div class="grammar-empty">📝 还没有语法记录<br><span style="font-size:0.85em;color:#bbb">点击 ➕ 添加 或让AI帮你录入</span></div>';
  } else {
    data.forEach((item, i) => {
      html += '<div class="grammar-card">';
      html += '<div class="gc-title">' + escHtml(item.title) + '</div>';
      if (item.desc) html += '<div class="gc-desc">' + escHtml(item.desc) + '</div>';
      if (item.exampleEn) {
        html += '<div class="gc-example">';
        html += '<div class="gc-example-en"><button class="gc-speak" onclick="speakGrammar(this,' + i + ')">🔊</button><span>' + escHtml(item.exampleEn) + '</span></div>';
        if (item.exampleZh) html += '<div class="gc-example-zh">' + escHtml(item.exampleZh) + '</div>';
        html += '</div>';
      }
      if (item.tags && item.tags.length) {
        html += '<div class="gc-tags">';
        item.tags.forEach(t => { html += '<span class="gc-tag">' + escHtml(t) + '</span>'; });
        html += '</div>';
      }
      // Delete button (small, right-aligned)
      html += '<div style="text-align:right;margin-top:8px"><button style="background:none;border:1px solid #e74c3c;color:#e74c3c;font-size:0.78em;padding:3px 12px;border-radius:10px;cursor:pointer" onclick="deleteGrammarItem(' + i + ')">删除</button></div>';
      html += '</div>';
    });
  }
  
  html += '<div style="text-align:center;color:#aaa;font-size:0.78em;margin-top:20px">共 ' + data.length + ' 条语法记录 | 数据保存在本地</div>';
  container.innerHTML = html;
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function speakGrammar(btn, index) {
  const data = getGrammarData();
  const item = data[index];
  if (!item || !item.exampleEn) return;
  
  const u = new SpeechSynthesisUtterance(item.exampleEn);
  u.lang = 'en-US'; u.rate = 0.85;
  u.onstart = () => { btn.classList.add('playing'); };
  u.onend = () => { btn.classList.remove('playing'); };
  u.onerror = () => { btn.classList.remove('playing'); };
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function openGrammarAdd() {
  document.getElementById('grammarAddOverlay').classList.add('active');
  document.getElementById('gaTitle').value = '';
  document.getElementById('gaDesc').value = '';
  document.getElementById('gaExampleEn').value = '';
  document.getElementById('gaExampleZh').value = '';
  document.getElementById('gaTags').value = '';
  document.getElementById('gaTitle').focus();
}
function closeGrammarAdd() {
  document.getElementById('grammarAddOverlay').classList.remove('active');
}

function saveGrammarItem() {
  const title = document.getElementById('gaTitle').value.trim();
  const desc = document.getElementById('gaDesc').value.trim();
  const exampleEn = document.getElementById('gaExampleEn').value.trim();
  const exampleZh = document.getElementById('gaExampleZh').value.trim();
  const tagsStr = document.getElementById('gaTags').value.trim();
  
  if (!title) { alert('请输入语法标题'); return; }
  if (!exampleEn) { alert('请输入例句'); return; }
  
  const tags = tagsStr ? tagsStr.split(/[,，]/).map(t=>t.trim()).filter(Boolean) : [];
  const data = getGrammarData();
  data.push({ title, desc, exampleEn, exampleZh, tags, addedAt: Date.now() });
  setGrammarData(data);
  
  closeGrammarAdd();
  renderGrammarList();
}

function deleteGrammarItem(index) {
  if (!confirm('确定删除这条语法记录？')) return;
  const data = getGrammarData();
  data.splice(index, 1);
  setGrammarData(data);
  renderGrammarList();
}

// AI批量导入语法（从控制台或外部调用）
function importGrammar(items) {
  // items: [{title, desc, exampleEn, exampleZh, tags}]
  const data = getGrammarData();
  items.forEach(item => {
    data.push({
      title: item.title || '',
      desc: item.desc || '',
      exampleEn: item.exampleEn || '',
      exampleZh: item.exampleZh || '',
      tags: item.tags || [],
      addedAt: Date.now()
    });
  });
  setGrammarData(data);
  console.log('Imported ' + items.length + ' grammar items');
}

let shadowSlowMode = false;

// === Word popup for shadow sentences ===
let shadowPopupEl = null;
let shadowPopupAudio = null;
let shadowPopupCache = {}; // cache word lookups
let localVocabMap = null; // en->wordObj from vocab-data.js

function buildLocalVocabMap() {
  if (localVocabMap) return;
  localVocabMap = {};
  try {
    getAllWords().forEach(w => {
      const key = w.en.toLowerCase().replace(/[^a-z]/g, '');
      if (!localVocabMap[key]) localVocabMap[key] = w;
    });
  } catch(e) {}
}

function closeWordPopup() {
  if (shadowPopupEl) {
    shadowPopupEl.remove();
    shadowPopupEl = null;
  }
  const bd = document.getElementById('swp-backdrop');
  if (bd) bd.remove();
  if (shadowPopupAudio) {
    try { shadowPopupAudio.pause(); } catch(e) {}
    shadowPopupAudio = null;
  }
  document.removeEventListener('scroll', _popupScrollHandler, true);
  document.removeEventListener('click', _popupClickHandler);
}
let _popupScrollHandler = null;
let _popupClickHandler = null;

async function showWordPopup(spanEl) {
  closeWordPopup();
  const rawWord = spanEl.getAttribute('data-word') || spanEl.textContent;
  const word = rawWord.replace(/[^a-zA-Z'-]/g, '').toLowerCase();
  if (!word || word.length < 2) return;

  buildLocalVocabMap();

  // Create popup
  const backdrop = document.createElement('div');
  backdrop.id = 'swp-backdrop';
  backdrop.className = 'shadow-word-popup-backdrop';
  document.body.appendChild(backdrop);
  const popup = document.createElement('div');
  popup.className = 'shadow-word-popup';
  popup.innerHTML = '<div class="swp-loading">⚡ 加载中...</div>';
  document.body.appendChild(popup);
  shadowPopupEl = popup;

  // Close on click outside or scroll
  _popupClickHandler = (e) => {
    if (!popup.contains(e.target) && e.target !== spanEl) {
      closeWordPopup();
    }
  };
  _popupScrollHandler = () => {
    closeWordPopup();
  };
  backdrop.addEventListener('click', () => closeWordPopup());
  setTimeout(() => {
    document.addEventListener('click', _popupClickHandler);
    document.addEventListener('scroll', _popupScrollHandler, true);
  }, 50);

  // Check cache first
  if (shadowPopupCache[word]) {
    renderWordPopup(popup, shadowPopupCache[word]);
    return;
  }

  // Try local vocab data first (instant, no network)
  const localKey = word.replace(/[^a-z]/g, '');
  const localWord = localVocabMap[localKey];

  // Build info object
  let info;
  if (localWord) {
    // We have local data — use it immediately
    info = {
      word: localWord.en || word,
      phonetic: localWord.phonetic || '',
      audioUrl: '', // will try to find from API lazily
      meanings: [],
      enMeanings: [],
      zhMeaning: localWord.meaning || '',
      zhPos: localWord.pos || '',
      hasLocal: true
    };
    shadowPopupCache[word] = info;
    renderWordPopup(popup, info);
    // Still fetch API in background for English defs + audio
    fetchPopupApiData(word, popup, info);
  } else {
    // No local data — must fetch from API
    await fetchPopupApiData(word, popup, null);
  }
}

async function fetchPopupApiData(word, popup, existingInfo) {
  try {
    const resp = await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(word));
    if (!resp.ok) {
      if (!existingInfo) {
        popup.innerHTML = '<div style="color:#999;font-size:0.88em;padding:8px;">未找到 "' + word + '" 的释义</div>';
      }
      return;
    }
    const data = await resp.json();
    const entry = data[0];
    const phonetic = entry.phonetic || (entry.phonetics && entry.phonetics.find(p => p.text)?.text) || '';
    let audioUrl = '';
    const phonetics = entry.phonetics || [];
    const usAudio = phonetics.find(p => p.audio && p.audio.includes('-us'));
    const anyAudio = phonetics.find(p => p.audio);
    audioUrl = (usAudio || anyAudio)?.audio || '';
    if (audioUrl && !audioUrl.startsWith('http')) audioUrl = 'https:' + audioUrl;
    const enMeanings = (entry.meanings || []).map(m => ({
      pos: m.partOfSpeech || '',
      defs: (m.definitions || []).slice(0, 3).map(d => d.definition || '')
    }));

    const info = existingInfo || { word, phonetic: '', audioUrl: '', meanings: [], zhMeaning: '', zhPos: '', hasLocal: false };
    info.phonetic = info.phonetic || phonetic;
    info.audioUrl = info.audioUrl || audioUrl;
    info.enMeanings = enMeanings;
    shadowPopupCache[word] = info;
    // Re-render if popup is still open for this word
    if (shadowPopupEl === popup) renderWordPopup(popup, info);
  } catch(e) {
    if (!existingInfo) {
      popup.innerHTML = '<div style="color:#e74c3c;font-size:0.88em;padding:8px;">查询失败，请重试</div>';
    }
  }
}

let popupShowZh = false; // track zh toggle state per popup

function renderWordPopup(popup, info) {
  const { word, phonetic, audioUrl, meanings, enMeanings, zhMeaning, zhPos, hasLocal } = info;
  popupShowZh = false;
  let html = '<div class="swp-head">';
  html += '<span class="swp-word">' + word + '</span>';
  if (phonetic) html += '<span class="swp-phonetic">' + phonetic + '</span>';
  if (audioUrl) {
    html += '<button class="swp-play" onclick="playPopupWord(this,\'' + audioUrl.replace(/'/g, "\\'") + '\')" title="播放发音">🔊</button>';
  } else {
    html += '<button class="swp-play" onclick="playPopupTTS(\'' + word.replace(/'/g, "\\'") + '\')" title="播放发音">🔊</button>';
  }
  html += '</div>';
  
  const enDefs = enMeanings || [];
  const hasZh = !!(zhMeaning);
  const hasEn = enDefs.length > 0;
  
  // English definitions (from Free Dictionary API)
  if (hasEn) {
    html += '<div class="swp-en-meanings">';
    const nums = ['❶','❷','❸'];
    enDefs.forEach(m => {
      m.defs.forEach((d, di) => {
        html += '<div class="swp-m">';
        if (di === 0 && m.pos) html += '<span class="swp-m-pos">' + m.pos + '</span> ';
        html += nums[Math.min(di,2)] + ' ' + d + '</div>';
      });
    });
    html += '</div>';
  }
  
  // Chinese section
  if (hasZh) {
    if (hasEn) {
      html += '<button class="swp-zh-toggle" onclick="togglePopupZh(this)">🇨🇳 中文</button>';
      html += '<div class="swp-zh-area hidden">';
    } else {
      html += '<div class="swp-zh-area">';
    }
    html += '<div class="swp-m zh">' + (zhPos ? '<span class="swp-m-pos">' + zhPos + '</span> ' : '') + zhMeaning + '</div>';
    html += '</div>';
  } else if (hasEn) {
    // Has English but no Chinese — show hint
    html += '<div class="swp-zh-area" style="margin-top:6px;"><div style="font-size:0.72em;color:#aaa;">💡 词库暂无中文释义</div></div>';
  } else if (meanings && meanings.length > 0) {
    html += '<div class="swp-zh-area">';
    meanings.forEach(m => {
      m.defs.forEach((d) => {
        html += '<div class="swp-m">' + d + '</div>';
      });
    });
    html += '</div>';
  }
  
  popup.innerHTML = html;
}

function togglePopupZh(btn) {
  const area = btn.nextElementSibling;
  if (!area || !area.classList.contains('swp-zh-area')) return;
  popupShowZh = !popupShowZh;
  area.classList.toggle('hidden', !popupShowZh);
  btn.classList.toggle('active', popupShowZh);
  btn.textContent = popupShowZh ? '🇨🇳 英文' : '🇨🇳 中文';
}

function playPopupTTS(word) {
  const utt = new SpeechSynthesisUtterance(word);
  utt.lang = 'en-US';
  speechSynthesis.speak(utt);
}

function playPopupWord(btn, audioUrl) {
  // Use Web Audio API (same engine as word pronunciation)
  if (audioCtx.state === 'suspended') audioCtx.resume();
  btn.classList.add('playing');
  fetch(audioUrl).then(r => r.arrayBuffer()).then(buf => audioCtx.decodeAudioData(buf)).then(audioBuf => {
    const source = audioCtx.createBufferSource();
    source.buffer = audioBuf;
    source.connect(audioCtx.destination);
    source.onended = () => btn.classList.remove('playing');
    source.start(0);
  }).catch(() => {
    btn.classList.remove('playing');
    // Fallback: TTS
    const utt = new SpeechSynthesisUtterance(btn.closest('.shadow-word-popup').querySelector('.swp-word')?.textContent || '');
    utt.lang = 'en-US';
    utt.onend = () => btn.classList.remove('playing');
    speechSynthesis.speak(utt);
  });
}

  };

  for (const [cat, sentences] of Object.entries(cats)) {
    html += '<div class="shadow-category">';
    html += '<div class="shadow-category-title">' + (catIcons[cat] || '📌') + ' ' + cat + ' (' + sentences.length + '句)</div>';
    sentences.forEach(s => {
      const words = s.en.split(/(\s+|[.,!?;:'"\-—])/);
      const wordSpans = words.map((w, wi) => {
        if (/^\s+$/.test(w)) return ' ';
        if (/^[.,!?;:'"\-—]$/.test(w)) return '<span class="se-word se-punct" data-idx="' + s.idx + '-' + wi + '">' + w + '</span>';
        return '<span class="se-word lookupable" data-idx="' + s.idx + '-' + wi + '" data-word="' + w.replace(/[.,!?;:'"\-—]/g, '') + '" onclick="showWordPopup(this)">' + w + '</span>';
      }).join('');

      html += '<div class="shadow-card" id="sc-' + s.idx + '">';
      html += '<div class="shadow-en"><span class="shadow-num">' + (s.idx + 1) + '</span>' + wordSpans + '</div>';
      html += (s.zh ? '<button class="shadow-zh-btn" onclick="toggleShadowZh(this,' + s.idx + ')">🇨🇳 译文</button><div class="shadow-zh hidden" id="szh-' + s.idx + '">' + s.zh + '</div>' : '');
      html += '<div class="shadow-controls">';
      html += '<button class="shadow-play-btn" id="sp-' + s.idx + '" onclick="playShadow(' + s.idx + ')" title="播放">▶</button>';
      html += '<button class="shadow-slow-btn' + (shadowSlowMode ? ' active' : '') + '" onclick="toggleShadowSlow(' + s.idx + ')" title="慢速">🐢 慢</button>';
      html += '<button class="shadow-record-btn' + (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) ? ' disabled' : '') + '" id="sr-' + s.idx + '" onclick="startShadowRecording(' + s.idx + ')" title="跟读">🎤 跟读</button>';
      html += '</div>';
      html += '<div class="shadow-result" id="sres-' + s.idx + '"></div>';
      html += '</div>';
    });
    html += '</div>';
  }

  inner.innerHTML = html;
}

function stopShadowPlayback() {
  if (shadowCurrentPlaying !== null) {
    speechSynthesis.cancel();
    // Stop Web Audio source if playing
    if (currentSource && currentKey === 'shadow-' + shadowCurrentPlaying) {
      try { currentSource.stop(); } catch(e) {}
      currentSource = null;
      currentKey = null;
    }
    const btn = document.getElementById('sp-' + shadowCurrentPlaying);
    if (btn) { btn.classList.remove('playing'); btn.textContent = '▶'; btn.classList.remove('loading'); }
    const card = document.getElementById('sc-' + shadowCurrentPlaying);
    if (card) card.classList.remove('sc-playing');
    // Clear highlights
    document.querySelectorAll('.se-word.highlight[data-idx^="' + shadowCurrentPlaying + '-"]').forEach(el => el.classList.remove('highlight'));
    shadowCurrentPlaying = null;
  }
}

function playShadow(idx) {
  // If same sentence playing, stop
  if (shadowCurrentPlaying === idx) {
    stopShadowPlayback();
    return;
  }
  stopShadowPlayback();
  stopShadowRecording();

  const s = SHADOW_SENTENCES[idx];
  const btn = document.getElementById('sp-' + idx);
  const card = document.getElementById('sc-' + idx);
  if (!btn || !s) return;

  shadowCurrentPlaying = idx;
  btn.classList.add('playing');
  btn.textContent = '⏹';
  card.classList.add('sc-playing');

  // Try real human audio first (YouTube native audio)
  const audioFile = s.audio || ('s' + String(idx).padStart(3, '0') + '.mp3');
  const audioUrl = 'shadow-audio-v2/' + audioFile;
  
  // Word-by-word highlight timing
  const words = s.en.split(/\s+/).filter(w => w.length > 0);
  let highlightTimers = [];
  
  function clearHighlightTimers() {
    highlightTimers.forEach(t => clearTimeout(t));
    highlightTimers = [];
  }
  
  // Analyze audio to find word boundaries via silence detection
  function findWordBoundaries(audioBuf, wordCount) {
    const data = audioBuf.getChannelData(0);
    const sr = audioBuf.sampleRate;
    const frameMs = 10; // 10ms frames
    const frameSize = Math.round(sr * frameMs / 1000);
    const silenceThreshold = 0.015;
    const minSilenceMs = 80;
    const minSilenceFrames = Math.round(minSilenceMs / frameMs);
    
    // Compute RMS energy per frame
    const energies = [];
    for (let i = 0; i < data.length; i += frameSize) {
      let sum = 0;
      const end = Math.min(i + frameSize, data.length);
      for (let j = i; j < end; j++) sum += data[j] * data[j];
      energies.push(Math.sqrt(sum / (end - i)));
    }
    
    // Find silence regions (consecutive low-energy frames)
    const silences = [];
    let inSil = false, silStart = 0;
    for (let i = 0; i < energies.length; i++) {
      if (energies[i] < silenceThreshold) {
        if (!inSil) { inSil = true; silStart = i; }
      } else {
        if (inSil) {
          inSil = false;
          if (i - silStart >= minSilenceFrames) {
            const startMs = silStart * frameMs;
            const endMs = i * frameMs;
            silences.push({ start: startMs, end: endMs, mid: (startMs + endMs) / 2, len: endMs - startMs });
          }
        }
      }
    }
    if (inSil && energies.length - silStart >= minSilenceFrames) {
      const startMs = silStart * frameMs;
      const endMs = energies.length * frameMs;
      silences.push({ start: startMs, end: endMs, mid: (startMs + endMs) / 2, len: endMs - startMs });
    }
    
    if (silences.length === 0) return null;
    
    // Pick the best N-1 silences for word boundaries
    const needed = Math.max(1, wordCount - 1);
    const audioMs = (data.length / sr) * 1000;
    const margin = audioMs * 0.05;
    // Prefer interior silences (not leading/trailing)
    const interior = silences.filter(s => s.start > margin && s.end < audioMs - margin);
    const pool = interior.length >= needed ? interior : silences;
    // Sort by length desc, pick top N-1, then re-sort by time
    const chosen = pool.sort((a, b) => b.len - a.len).slice(0, needed).sort((a, b) => a.start - b.start);
    
    // Build word start times
    const boundaries = [0]; // first word starts at 0
    chosen.forEach(s => boundaries.push(s.mid));
    return boundaries;
  }
  
  function startHighlightFromBoundaries(boundaries, totalDurationMs) {
    clearHighlightTimers();
    for (let wi = 0; wi < words.length; wi++) {
      const startTime = (wi < boundaries.length) ? boundaries[wi] : (totalDurationMs * wi / words.length);
      const t = setTimeout(() => {
        document.querySelectorAll('.se-word[data-idx^="' + idx + '-"]').forEach(el => el.classList.remove('highlight'));
        const wordEl = document.querySelector('.se-word[data-idx="' + idx + '-' + wi + '"]');
        if (wordEl) wordEl.classList.add('highlight');
      }, startTime);
      highlightTimers.push(t);
    }
  }
  
  function startHighlight(durationMs) {
    clearHighlightTimers();
    if (words.length === 0) return;
    const charLens = words.map(w => w.replace(/[^a-zA-Z]/g, '').length);
    const totalChars = charLens.reduce((a, b) => a + b, 0) || 1;
    const gapMs = 40;
    const totalGaps = (words.length - 1) * gapMs;
    const speechMs = Math.max(1, durationMs - totalGaps);
    let offset = 0;
    words.forEach((w, wi) => {
      const wordMs = (charLens[wi] / totalChars) * speechMs;
      const t = setTimeout(() => {
        document.querySelectorAll('.se-word[data-idx^="' + idx + '-"]').forEach(el => el.classList.remove('highlight'));
        const wordEl = document.querySelector('.se-word[data-idx="' + idx + '-' + wi + '"]');
        if (wordEl) wordEl.classList.add('highlight');
      }, offset);
      highlightTimers.push(t);
      offset += wordMs + gapMs;
    });
  }
  
  function onPlayEnd() {
    btn.classList.remove('playing');
    btn.textContent = '▶';
    card.classList.remove('sc-playing');
    document.querySelectorAll('.se-word[data-idx^="' + idx + '-"]').forEach(el => el.classList.remove('highlight'));
    shadowCurrentPlaying = null;
    clearHighlightTimers();
  }
  
  // Use Web Audio API for real audio (same engine as word pronunciation)
  if (audioCtx.state === 'suspended') audioCtx.resume();
  
  btn.classList.add('loading');
  fetch(audioUrl).then(resp => {
    if (!resp.ok) throw new Error('no audio');
    return resp.arrayBuffer();
  }).then(arrayBuf => {
    btn.classList.remove('loading');
    return audioCtx.decodeAudioData(arrayBuf);
  }).then(audioBuf => {
    const source = audioCtx.createBufferSource();
    source.buffer = audioBuf;
    
    // Slow mode: reduce playback rate
    if (shadowSlowMode) {
      source.playbackRate.value = 0.6;
    }
    
    source.connect(audioCtx.destination);
    const durationMs = (audioBuf.duration / (shadowSlowMode ? 0.6 : 1)) * 1000;
    // Try silence-based word boundary detection for accurate highlight sync
    const boundaries = findWordBoundaries(audioBuf, words.length);
    if (boundaries && boundaries.length === words.length) {
      startHighlightFromBoundaries(boundaries, durationMs);
    } else {
      startHighlight(durationMs);
    }
    
    source.onended = () => {
      if (shadowCurrentPlaying === idx) onPlayEnd();
    };
    source.start(0);
    currentSource = source;
    currentKey = 'shadow-' + idx;
  }).catch(e => {
    btn.classList.remove('loading');
    // Fallback to browser TTS
    console.log('Shadow audio not found, falling back to TTS for', idx);
    const synth = window.speechSynthesis;
    synth.cancel();
    const utt = new SpeechSynthesisUtterance(s.en);
    utt.lang = 'en-US';
    utt.rate = shadowSlowMode ? 0.55 : 0.9;
    utt.pitch = 1.0;
    const voices = synth.getVoices();
    const preferred = voices.find(v => v.lang === 'en-US' && !v.localService) ||
      voices.find(v => v.lang === 'en-US') ||
      voices.find(v => v.lang.startsWith('en'));
    if (preferred) utt.voice = preferred;
    const wordDuration = (utt.rate > 0.7 ? 280 : 450);
    const charLens = words.map(w => w.replace(/[^a-zA-Z]/g, '').length);
    const totalChars = charLens.reduce((a, b) => a + b, 0) || 1;
    const gapMs = 40;
    const totalGaps = (words.length - 1) * gapMs;
    const speechMs = Math.max(1, words.length * wordDuration - totalGaps);
    let tOffset = 0;
    const fbTimers = [];
    // Use onboundary for precise word tracking (Chrome/Edge support it)
    let boundaryIdx = 0;
    utt.onboundary = (ev) => {
      if (ev.name === 'word') {
        // Clear previous highlights
        document.querySelectorAll('.se-word[data-idx^="' + idx + '-"]').forEach(el => el.classList.remove('highlight'));
        // Find which word this boundary corresponds to
        const spokenWord = s.en.substring(ev.charIndex, ev.charIndex + ev.charLength).trim().toLowerCase();
        for (let wi = boundaryIdx; wi < words.length; wi++) {
          if (words[wi].toLowerCase().replace(/[^a-z]/g, '') === spokenWord.replace(/[^a-z]/g, '')) {
            const wordEl = document.querySelector('.se-word[data-idx="' + idx + '-' + wi + '"]');
            if (wordEl) wordEl.classList.add('highlight');
            boundaryIdx = wi + 1;
            break;
          }
        }
      }
    };
    // Fallback timers in case onboundary doesn't fire
    words.forEach((w, wi) => {
      const wMs = (charLens[wi] / totalChars) * speechMs;
      const t = setTimeout(() => {
        if (boundaryIdx === 0) { // onboundary never fired, use estimate
          document.querySelectorAll('.se-word[data-idx^="' + idx + '-"]').forEach(el => el.classList.remove('highlight'));
          const wordEl = document.querySelector('.se-word[data-idx="' + idx + '-' + wi + '"]');
          if (wordEl) wordEl.classList.add('highlight');
        }
      }, tOffset);
      fbTimers.push(t);
      tOffset += wMs + gapMs;
    });
    utt.onend = () => { onPlayEnd(); fbTimers.forEach(t => clearTimeout(t)); };
    utt.onerror = () => { onPlayEnd(); fbTimers.forEach(t => clearTimeout(t)); };
    synth.speak(utt);
  });
}

function toggleShadowSlow(idx) {
  shadowSlowMode = !shadowSlowMode;
  // Update all slow buttons
  document.querySelectorAll('.shadow-slow-btn').forEach(b => {
    b.classList.toggle('active', shadowSlowMode);
  });
}

function stopShadowRecording() {
  if (shadowRecognition) {
    shadowRecognition.abort();
    shadowRecognition = null;
  }
  if (shadowRecording !== null) {
    const btn = document.getElementById('sr-' + shadowRecording);
    if (btn) { btn.classList.remove('recording'); btn.innerHTML = '🎤 跟读'; }
    const card = document.getElementById('sc-' + shadowRecording);
    if (card) card.classList.remove('sc-recording');
    shadowRecording = null;
  }
}

function startShadowRecording(idx) {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('您的浏览器不支持语音识别，请使用Chrome浏览器');
    return;
  }

  // If already recording same one, stop
  if (shadowRecording === idx) {
    stopShadowRecording();
    return;
  }
  stopShadowRecording();
  stopShadowPlayback();

  const s = SHADOW_SENTENCES[idx];
  const btn = document.getElementById('sr-' + idx);
  const card = document.getElementById('sc-' + idx);
  const resultDiv = document.getElementById('sres-' + idx);

  shadowRecording = idx;
  btn.classList.add('recording');
  btn.innerHTML = '⏹ 停止';
  card.classList.add('sc-recording');

  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  shadowRecognition = new SpeechRec();
  shadowRecognition.lang = 'en-US';
  shadowRecognition.interimResults = true;
  shadowRecognition.continuous = false;
  shadowRecognition.maxAlternatives = 3;

  let finalTranscript = '';

  shadowRecognition.onresult = function(event) {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        finalTranscript += event.results[i][0].transcript;
      } else {
        interim += event.results[i][0].transcript;
      }
    }
    const spoken = (finalTranscript || interim).trim();
    if (spoken && resultDiv) {
      const similarity = calcSimilarity(spoken.toLowerCase(), s.en.toLowerCase());
      let level, cls;
      if (similarity >= 0.8) { level = '✅ 很棒！发音准确'; cls = 'sr-good'; }
      else if (similarity >= 0.5) { level = '⚠️ 还不错，继续加油'; cls = 'sr-ok'; }
      else { level = '❌ 再听几遍试试'; cls = 'sr-bad'; }
      resultDiv.innerHTML = '<div class="shadow-result-text ' + cls + '">' + level + ' (' + Math.round(similarity * 100) + '%)</div>' +
        '<div class="shadow-result-text" style="color:#999">你说: ' + spoken + '</div>';
    }
  };

  shadowRecognition.onerror = function(event) {
    btn.classList.remove('recording');
    btn.innerHTML = '🎤 跟读';
    card.classList.remove('sc-recording');
    shadowRecording = null;
    if (resultDiv && event.error !== 'aborted') {
      resultDiv.innerHTML = '<div class="shadow-result-text sr-bad">语音识别出错: ' + event.error + '</div>';
    }
  };

  shadowRecognition.onend = function() {
    btn.classList.remove('recording');
    btn.innerHTML = '🎤 跟读';
    card.classList.remove('sc-recording');
    shadowRecording = null;
  };

  shadowRecognition.start();
}

// Simple word-level similarity
function calcSimilarity(a, b) {
  // Remove punctuation
  const clean = s => s.replace(/[^a-z0-9\s]/g, '').split(/\s+/).filter(w => w.length > 0);
  const wa = clean(a);
  const wb = clean(b);
  if (wb.length === 0) return 0;
  let matches = 0;
  wa.forEach(w => {
    if (wb.includes(w)) matches++;
  });
  // Also check reverse
  wb.forEach(w => {
    if (wa.includes(w)) matches++;
  });
  return matches / (wa.length + wb.length);
}
